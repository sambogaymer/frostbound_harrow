<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon & Dragons — Choose Your Class</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:ital,wght@0,400;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:        #E3350D;
      --red-dark:   #b02a0a;
      --white:      #FAFAFA;
      --off-white:  #F0EDE8;
      --black:      #1a1a1a;
      --gray:       #6b6b6b;
      --gray-lt:    #d4d0c8;

      /* Pokémon type palette — one per class */
      --fire:       #FF9741;
      --water:      #3B9DD4;
      --grass:      #5FBD58;
      --psychic:    #FF6DA3;
      --dragon:     #4F60E2;
      --dark:       #5B5466;
      --electric:   #F4D23C;
      --fighting:   #D62828;
      --ghost:      #6B4FA0;
      --ice:        #74CEC0;
      --normal:     #9FA19F;
      --poison:     #9B5FC0;
      --rock:       #C9B560;
    }

    body {
      background-color: var(--off-white);
      color: var(--black);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
    }

    /* ── Top stripe ── */
    .top-stripe {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 10px;
      background: var(--red);
      z-index: 100;
    }
    .top-stripe::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 4px;
      background: var(--black);
    }

    /* ── Pokéball watermark ── */
    .pokeball-bg {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 420px; height: 420px;
      opacity: 0.05;
      pointer-events: none;
      animation: slow-spin 60s linear infinite;
      z-index: 0;
    }
    @keyframes slow-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 1.25rem 3rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.4rem;
      animation: fade-up 0.5s ease both;
    }

    .next-btn {
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 8px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      box-shadow: 2px 2px 0 #555;
    }
    .next-btn:hover { background: var(--red); }

    .header-text h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(9px, 2vw, 13px);
      color: var(--red);
      text-shadow: 2px 2px 0 var(--red-dark);
      line-height: 1.5;
    }
    .header-text p {
      font-size: 13px;
      color: var(--gray);
      font-style: italic;
      margin-top: 4px;
    }

    /* ── Divider ── */
    .dex-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 1.1rem 0 1.5rem;
      animation: fade-up 0.5s 0.05s ease both;
    }
    .dex-divider-line { flex: 1; height: 2px; background: var(--black); }
    .dex-divider-dot  { width: 10px; height: 10px; border-radius: 50%; background: var(--red); border: 2px solid var(--black); }
    .dex-divider-dot.small { width: 6px; height: 6px; }

    /* ── Class list ── */
    .class-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .class-row {
      background: var(--white);
      border: 2.5px solid var(--black);
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--black);
      transition: transform 0.13s ease, box-shadow 0.13s ease;
      text-decoration: none;
      color: inherit;
      animation: fade-up 0.4s ease both;
      position: relative;
      overflow: hidden;
    }

    /* staggered entrance */
    .class-row:nth-child(1)  { animation-delay: 0.07s; }
    .class-row:nth-child(2)  { animation-delay: 0.11s; }
    .class-row:nth-child(3)  { animation-delay: 0.15s; }
    .class-row:nth-child(4)  { animation-delay: 0.19s; }
    .class-row:nth-child(5)  { animation-delay: 0.23s; }
    .class-row:nth-child(6)  { animation-delay: 0.27s; }
    .class-row:nth-child(7)  { animation-delay: 0.31s; }
    .class-row:nth-child(8)  { animation-delay: 0.35s; }
    .class-row:nth-child(9)  { animation-delay: 0.39s; }
    .class-row:nth-child(10) { animation-delay: 0.43s; }
    .class-row:nth-child(11) { animation-delay: 0.47s; }
    .class-row:nth-child(12) { animation-delay: 0.51s; }
    .class-row:nth-child(13) { animation-delay: 0.55s; }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .class-row:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--black);
    }
    .class-row:active {
      transform: translate(1px, 1px);
      box-shadow: 1px 1px 0 var(--black);
    }

    .class-row.selected {
      background: #fff4f2;
      border-color: var(--red);
      transform: none;
      box-shadow: 3px 3px 0 var(--black);
    }
    .class-row.selected .class-name { color: var(--red); }

    /* left color accent strip */
    .class-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      border-radius: 11px 0 0 11px;
      background: var(--accent);
    }

    /* icon badge */
    .class-icon {
      width: 52px; height: 52px;
      border-radius: 10px;
      border: 2px solid var(--black);
      background: var(--icon-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      color: var(--accent);
      flex-shrink: 0;
      margin-left: 6px;
    }

    .class-info { flex: 1; }

    .class-name {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1.8vw, 11px);
      color: var(--black);
      line-height: 1.5;
    }

    .class-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 5px;
    }

    .type-badge {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      padding: 2px 9px;
      border-radius: 999px;
      color: #fff;
      background: var(--accent);
    }
    /* electric badge needs dark text */
    .type-badge.dark-text { color: #333; }

    .class-source {
      font-size: 11px;
      color: var(--gray);
      font-style: italic;
    }

    .class-arrow {
      font-size: 20px;
      color: var(--accent);
      flex-shrink: 0;
      transition: transform 0.15s ease;
    }
    .class-row:hover .class-arrow { transform: translateX(3px); }

    /* ── Footer ── */
    .footer {
      margin-top: 2rem;
      font-size: 11px;
      color: var(--gray);
      text-align: center;
      font-style: italic;
    }
    .footer strong {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--red);
      font-style: normal;
    }
    /* ── Trainer name card ── */
    .name-card {
      background: var(--white);
      border: 2.5px solid var(--black);
      border-radius: 14px;
      box-shadow: 3px 3px 0 var(--black);
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
      animation: fade-up 0.4s ease both;
      position: relative;
      overflow: hidden;
    }
    .name-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: var(--red);
      border-radius: 11px 0 0 11px;
    }
    .name-card-icon {
      width: 46px; height: 46px;
      border-radius: 10px;
      border: 2px solid var(--black);
      background: #fdeaea;
      color: var(--red);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      margin-left: 6px;
    }
    .name-card-body { flex: 1; display: flex; flex-direction: column; gap: 5px; }
    .name-card-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: var(--gray);
      letter-spacing: 0.06em;
    }
    .name-card-input {
      width: 100%;
      padding: 7px 10px;
      border: 2px solid var(--black);
      border-radius: 8px;
      background: var(--off-white);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--black);
      transition: border-color 0.15s;
    }
    .name-card-input:focus {
      outline: none;
      border-color: var(--red);
    }
    .name-card-input::placeholder { color: var(--gray-lt); font-weight: 400; }

    /* ════════ FROST THEME ════════ */
    :root {
      --red:        #E3350D;
      --red-dark:   #b02a0a;
      --white:      #1e2d3a;
      --off-white:  #172330;
      --black:      #d6eef8;
      --gray:       #7bafc8;
      --gray-lt:    #2e4a5e;
      --frost:      #a8d8ea;
      --frost-dark: #5b9bb5;
      --ice:        #d6eef8;
      --void:       #0d1e2b;
      --void-mid:   #112233;
      --accent:     #3a9abf;
    }

    body {
      background: linear-gradient(175deg, #0d1e2b 0%, #0f2235 50%, #091825 100%) !important;
      color: var(--ice) !important;
      position: relative;
    }

    /* faint snow layer */
    .snow-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .snow-bg .sf {
      position: absolute; top: -10px; border-radius: 50%;
      background: rgba(200,230,255,0.55);
      animation: sf-fall linear infinite;
    }
    @keyframes sf-fall {
      0%   { transform: translateY(-10px) translateX(0);   opacity: 0; }
      8%   { opacity: 0.7; }
      92%  { opacity: 0.4; }
      100% { transform: translateY(105vh) translateX(30px); opacity: 0; }
    }

    /* top stripe — icy */
    .top-stripe {
      background: linear-gradient(90deg, #1a5f7a, #3a9abf, #1a5f7a) !important;
    }
    .top-stripe::after {
      background: rgba(168,216,234,0.35) !important;
    }

    /* cards / panel cards */
    .panel-card, .dnd-card, .class-row, .name-card,
    .collapse-row, .equip-panel, .dropdown-panel,
    .stat-box, .combat-box, .points-card, .stat-card,
    .class-block .class-trigger, .class-block .equip-panel,
    .inv-modal, .selected-banner, .option-group,
    .pkg-box, .hero-banner, .tab-btn, .card {
      background: rgba(255,255,255,0.04) !important;
      border-color: rgba(168,216,234,0.2) !important;
      color: var(--ice) !important;
    }

    .panel-card::before  { background: var(--frost-dark) !important; }
    .hero-banner::before { background: var(--frost-dark) !important; }
    .class-row::before, .collapse-row::before, .name-card::before { background: var(--frost-dark) !important; }
    .stat-box::before    { background: var(--sc) !important; }
    .combat-box::before  { background: var(--frost-dark) !important; }
    .points-card::before { background: var(--frost-dark) !important; }
    .stat-card::before   { background: var(--stat-color) !important; }

    /* box shadows — icy */
    .panel-card, .hero-banner, .class-row, .name-card,
    .stat-box, .combat-box, .points-card, .stat-card,
    .collapse-row, .selected-banner {
      box-shadow: 3px 3px 0 rgba(58,154,191,0.3) !important;
    }

    /* text colours */
    .panel-card-title, .class-name, .stat-mod, .cb-value,
    .hp-current, .tab-btn.active, .poke-name, .trigger-name,
    .option-group-label, .collapse-title, .hero-name,
    .points-remaining, .stat-value, .dnd-title, .main-title,
    h1, .header-text h1 {
      color: var(--ice) !important;
    }

    .hero-sub, .class-source, .collapse-subtitle, .trigger-sub,
    .card-desc, .subtitle, .cost-label, .stat-name,
    .cb-sub, .mod-label, .poke-types, .inv-item-sub,
    .footer, .class-source {
      color: var(--gray) !important;
    }

    /* inputs */
    .name-card-input, .inv-search, .notes-area, .bg-input,
    .inv-form-input, .coin-adjust-input, .hp-input,
    .stat-btn, .inv-search-wrap {
      background: rgba(255,255,255,0.06) !important;
      border-color: rgba(168,216,234,0.25) !important;
      color: var(--ice) !important;
    }
    .name-card-input:focus, .inv-search:focus,
    .notes-area:focus, .bg-input:focus, .inv-form-input:focus { border-color: var(--frost) !important; }

    /* tabs */
    .tab-btn {
      background: rgba(255,255,255,0.05) !important;
      border-color: rgba(168,216,234,0.2) !important;
      color: var(--gray) !important;
    }
    .tab-btn.active {
      background: var(--frost-dark) !important;
      color: var(--ice) !important;
      border-color: var(--frost-dark) !important;
    }
    .tab-btn:hover:not(.active) { background: rgba(168,216,234,0.1) !important; }

    /* buttons */
    .next-btn, .save-btn, .rest-btn, .manage-inv-btn,
    .reset-btn, .back-btn, .home-btn {
      background: rgba(58,154,191,0.25) !important;
      border-color: rgba(168,216,234,0.35) !important;
      color: var(--ice) !important;
      box-shadow: 2px 2px 0 rgba(58,154,191,0.2) !important;
    }
    .next-btn:hover, .save-btn:hover, .rest-btn:hover,
    .manage-inv-btn:hover, .reset-btn:hover, .home-btn:hover {
      background: var(--frost-dark) !important;
    }

    /* stat buttons (+ / -) */
    .stat-btn {
      background: rgba(58,154,191,0.3) !important;
      border-color: rgba(168,216,234,0.3) !important;
      color: var(--ice) !important;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3) !important;
    }
    .stat-btn:hover:not(:disabled) { background: var(--frost-dark) !important; }
    .stat-btn:disabled { background: rgba(255,255,255,0.05) !important; border-color: rgba(255,255,255,0.1) !important; color: rgba(255,255,255,0.2) !important; }

    /* score chips on stat bar */
    .stat-score-chip { border-color: rgba(0,0,0,0.4) !important; }

    /* stat mod row bg */
    .stat-mod-row { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.15) !important; }

    /* save button (equipment) — keep it distinct */
    .save-btn {
      background: var(--frost-dark) !important;
      border-color: var(--frost) !important;
    }
    .save-btn:hover { background: var(--accent) !important; }

    /* type badges — keep their own colors */
    .type-badge, .trigger-badge, .badge, .hero-badge,
    .card-type-badge { color: #fff !important; }

    /* inv rows */
    .inv-row, .inv-table tbody tr:hover { background: rgba(255,255,255,0.05) !important; }
    .inv-stat-drawer { background: rgba(255,255,255,0.04) !important; }
    .inv-stat-chip.prop { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--gray) !important; }

    /* prof tags */
    .prof-tag { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--ice) !important; }

    /* skill / throw rows */
    .throw-row, .sense-chip { background: rgba(255,255,255,0.05) !important; border-color: rgba(168,216,234,0.15) !important; }
    .inv-row { background: rgba(255,255,255,0.04) !important; border-color: rgba(168,216,234,0.12) !important; }

    /* pokemon rows */
    .poke-row:hover { background: rgba(168,216,234,0.07) !important; }
    .poke-row.selected { background: rgba(58,154,191,0.15) !important; border-left-color: var(--frost) !important; }
    .poke-row.selected .poke-name { color: var(--frost) !important; }

    /* class row selected */
    .class-row.selected { background: rgba(58,154,191,0.12) !important; border-color: var(--frost-dark) !important; }
    .class-row.selected .class-name { color: var(--frost) !important; }

    /* option / pkg boxes */
    .pkg-box.selectable:hover { background: rgba(168,216,234,0.08) !important; }
    .pkg-box.selectable.selected { background: rgba(58,154,191,0.15) !important; border-color: var(--frost) !important; }

    /* item pills */
    .item-pill { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--ice) !important; }
    .item-pill i { color: var(--gray) !important; }

    /* coin chips */
    .coin-chip { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; }

    /* points bar track */
    .points-bar-wrap { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; }

    /* dividers */
    .dex-divider-line { background: rgba(168,216,234,0.25) !important; }
    .dex-divider-dot  { background: var(--frost-dark) !important; border-color: var(--frost) !important; box-shadow: 0 0 6px var(--frost-dark); }

    /* section headers in table */
    .inv-section-header td { border-bottom-color: rgba(168,216,234,0.3) !important; }

    /* poke-dex numbers */
    .poke-dex { color: rgba(168,216,234,0.2) !important; }

    /* cost badge */
    .cost-badge { color: #fff !important; }

    /* equip button unselected */
    .inv-equip-btn { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.25) !important; }

    /* modal overlays */
    .crop-modal, .inv-modal {
      background: #132030 !important;
      border-color: rgba(168,216,234,0.3) !important;
    }
    .inv-modal-head { background: #132030 !important; border-bottom-color: rgba(168,216,234,0.2) !important; }
    .inv-modal-section-title { background: rgba(255,255,255,0.05) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--ice) !important; }
    .inv-modal-section-title.open { background: rgba(58,154,191,0.15) !important; }
    .coin-cur-row { background: rgba(255,255,255,0.05) !important; border-color: rgba(168,216,234,0.12) !important; }
    .coin-cur-name { color: var(--ice) !important; }

    /* scrollbars */
    * { scrollbar-color: var(--frost-dark) rgba(255,255,255,0.05); }
    *::-webkit-scrollbar-track { background: rgba(255,255,255,0.04) !important; }
    *::-webkit-scrollbar-thumb { background: var(--frost-dark) !important; }

    /* hp sep */
    .hp-sep, .hp-max, .points-sep, .points-total-num { color: rgba(168,216,234,0.35) !important; }

    /* or-sep */
    .or-sep, .or-sep-inner { color: rgba(168,216,234,0.25) !important; }

    /* selected banner */
    .selected-banner.visible { background: rgba(255,255,255,0.05) !important; }
    .banner-name { color: var(--ice) !important; }

    /* bg-modal form labels */
    .bg-field label, .inv-form-field label, .coin-adjust-col label,
    .name-card-label, .crop-zoom-label { color: var(--gray) !important; }

    /* pokeball watermark tint */
    .pokeball-bg svg path { fill: #2a7fa0 !important; }
    .pokeball-bg svg circle:first-child { stroke: rgba(168,216,234,0.3) !important; }

    /* footer strong */
    .footer strong { color: var(--frost-dark) !important; }
    /* ════════ END FROST THEME ════════ */

    /* ── Snow toggle button ── */
    .snow-toggle {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      z-index: 200;
      background: rgba(13,30,43,0.85);
      border: 1.5px solid rgba(168,216,234,0.3);
      border-radius: 10px;
      padding: 6px 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: rgba(168,216,234,0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(6px);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .snow-toggle:hover {
      border-color: rgba(168,216,234,0.6);
      color: rgba(168,216,234,1);
      background: rgba(20,45,65,0.95);
    }
    .snow-toggle.snow-off {
      opacity: 0.5;
    }
    .snow-toggle .snow-icon {
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="top-stripe"></div>
<div class="snow-bg" id="snow-bg" aria-hidden="true"></div>


  <!-- Pokéball watermark -->
  <div class="pokeball-bg" aria-hidden="true">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="96" fill="none" stroke="#1a1a1a" stroke-width="8"/>
      <path d="M 4 100 A 96 96 0 0 1 196 100 Z" fill="#E3350D"/>
      <rect x="4" y="91" width="192" height="18" fill="#1a1a1a"/>
      <circle cx="100" cy="100" r="22" fill="#1a1a1a"/>
      <circle cx="100" cy="100" r="14" fill="#FAFAFA"/>
      <circle cx="100" cy="100" r="6"  fill="#1a1a1a"/>
    </svg>
  </div>

  <div class="page">

    <!-- Header -->
    <div class="header">
      <div class="header-text">
        <h1>Choose Your Class</h1>
        <p>Select a trainer class to begin your journey</p>
      </div>
      <button class="next-btn" id="next-btn" aria-label="Continue to next step">
        <i class="ti ti-arrow-right" aria-hidden="true"></i>
      </button>
    </div>

    <div class="dex-divider" aria-hidden="true">
      <div class="dex-divider-line"></div>
      <div class="dex-divider-dot small"></div>
      <div class="dex-divider-dot"></div>
      <div class="dex-divider-dot small"></div>
      <div class="dex-divider-line"></div>
    </div>

    <!-- Trainer name input -->
    <div class="name-card">
      <div class="name-card-icon"><i class="ti ti-user" aria-hidden="true"></i></div>
      <div class="name-card-body">
        <label class="name-card-label" for="trainer-name-input">TRAINER NAME</label>
        <input
          class="name-card-input"
          id="trainer-name-input"
          type="text"
          placeholder="Enter your trainer name…"
          maxlength="40"
          autocomplete="off"
        />
      </div>
    </div>

    <!-- Class list -->
    <div class="class-list" id="class-list"></div>

    <p class="footer"><strong>v0.1.0</strong> &nbsp;&middot;&nbsp; <span id="footer-tagline"></span></p>
  </div>

  <script>
    const classes = [
      {
        name: 'Seasoned Rival',
        type: 'Normal',
        source: 'Elite All-Rounder',
        icon: 'ti-star',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#9FA19F',
        customIcon: '<svg width="22" height="22" viewBox="0 0 22 22" fill="none" xmlns="http://www.w3.org/2000/svg"><polygon points="11,2 13.5,8 20,8.5 15,13 16.5,20 11,16.5 5.5,20 7,13 2,8.5 8.5,8" fill="#F4D23C" stroke="#c9a800" stroke-width="1.2" stroke-linejoin="round"/><polygon points="11,4.5 12.8,9 18,9.4 14,13 15.2,18 11,15.2 6.8,18 8,13 4,9.4 9.2,9" fill="#FF9741" opacity="0.5"/><circle cx="11" cy="11" r="2.5" fill="#E3350D"/></svg>',
      },
      {
        name: 'Iron Monk',
        type: 'Fighting',
        source: 'Martial Artist',
        icon: 'ti-barbell',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#D62828',
      },
      {
        name: 'Trail Warden',
        type: 'Grass',
        source: 'Wilderness Guardian',
        icon: 'ti-shield-star',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#5FBD58',
      },
      {
        name: 'Village Sprout',
        type: 'Normal',
        source: 'Scrappy Newcomer',
        icon: 'ti-mood-smile',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#9FA19F',
      },
      {
        name: 'Drumfire Bard',
        type: 'Fairy',
        source: 'Charming Battler',
        icon: 'ti-heart',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#FF6DA3',
      },
      {
        name: 'Thicket Trapper',
        type: 'Bug',
        source: 'Critter Enthusiast',
        icon: 'ti-bug',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#8CB230',
      },
      {
        name: 'Ridge Walker',
        type: 'Rock',
        source: 'Rugged Mountaineer',
        icon: 'ti-mountain',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#A38C21',
      },
      {
        name: 'Kindler',
        type: 'Fire',
        source: 'Flame Trainer',
        icon: 'ti-flame',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#FF9741',
      },
      {
        name: 'Shallows Sifter',
        type: 'Water',
        source: 'Aquatic Specialist',
        icon: 'ti-ripple',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#3B9DD4',
      },
      {
        name: 'Fieldborne',
        type: 'Normal',
        source: 'Resourceful Explorer',
        icon: 'ti-tent',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#9FA19F',
      },
      {
        name: 'Seer',
        type: 'Seer',
        source: 'Mystic Battler',
        icon: 'ti-sparkles',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#FF6DA3',
      },
      {
        name: 'Pokémon Tender',
        type: 'Grass',
        source: 'Nature Specialist',
        icon: 'ti-leaf',
        accent: '#9FA19F',
        iconBg: '#f2f2f2',
        badgeColor: '#2e8b57',
      },
    ];

    const list = document.getElementById('class-list');

    classes.forEach(function(cls) {
      const row = document.createElement('div');
      row.className = 'class-row';
      row.style.setProperty('--accent', cls.accent);
      row.style.setProperty('--icon-bg', cls.iconBg);
      row.setAttribute('role', 'button');
      row.setAttribute('tabindex', '0');
      row.setAttribute('aria-label', 'Select ' + cls.name);

      const badgeBg    = cls.badgeColor || cls.accent;
      const badgeClass = cls.badgeDark ? 'type-badge dark-text' : 'type-badge';
      // Icon uses the type color so it stays visually distinct against the gray bg
      const iconColor  = cls.badgeColor || cls.accent;

      const iconHtml = cls.customIcon
        ? '<div class="class-icon" style="display:flex;align-items:center;justify-content:center;">' + cls.customIcon + '</div>'
        : '<div class="class-icon" style="color:' + iconColor + '"><i class="ti ' + cls.icon + '" aria-hidden="true"></i></div>';

      row.innerHTML =
        iconHtml +
        '<div class="class-info">' +
          '<p class="class-name">' + cls.name.toUpperCase() + '</p>' +
          '<div class="class-meta">' +
            '<span class="' + badgeClass + '" style="background:' + badgeBg + '">' + cls.type + '</span>' +
            '<span class="class-source">' + cls.source + '</span>' +
          '</div>' +
        '</div>' +
        '<i class="ti ti-chevron-right class-arrow" aria-hidden="true"></i>';

      row.addEventListener('click', function() {
        // Deselect all rows
        document.querySelectorAll('.class-row').forEach(function(r) {
          r.classList.remove('selected');
        });
        // Highlight selected
        row.classList.add('selected');
        // Save to localStorage
        try { localStorage.setItem('pd_selected_class', cls.name); } catch(e) {}
      });

      row.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); row.click(); }
      });

      list.appendChild(row);
    });

    // ── Trainer name: restore saved value ──
    var nameInput = document.getElementById('trainer-name-input');
    try {
      var savedName = localStorage.getItem('pd_trainer_name');
      if (savedName) nameInput.value = savedName;
    } catch(e) {}

    // Save on every keystroke
    nameInput.addEventListener('input', function() {
      try { localStorage.setItem('pd_trainer_name', nameInput.value.trim()); } catch(e) {}
    });

    // Restore previously saved class selection on load
    try {
      var saved = localStorage.getItem('pd_selected_class');
      if (saved) {
        document.querySelectorAll('.class-row').forEach(function(r) {
          if (r.getAttribute('aria-label') === 'Select ' + saved) r.classList.add('selected');
        });
      }
    } catch(e) {}

    // Next button — validate name + class before advancing
    document.getElementById('next-btn').addEventListener('click', function() {
      var name = nameInput.value.trim();
      var cls  = '';
      try { cls = localStorage.getItem('pd_selected_class') || ''; } catch(e) {}
      if (!name) { nameInput.focus(); nameInput.style.borderColor = '#E3350D'; alert('Please enter your trainer name first!'); return; }
      if (!cls)  { alert('Please select a class first!'); return; }
      try { localStorage.setItem('pd_trainer_name', name); } catch(e) {}
      window.location.href = 'dnd_pokemon_starter_select.html';
    });

    nameInput.addEventListener('input', function() {
      nameInput.style.borderColor = '';
    });
  



    


    // ── Generate snow flakes ──
    (function() {
      var layer = document.getElementById('snow-bg') || document.getElementById('snow-layer');
      if (!layer || layer.children.length > 0) return;
      var cls = layer.id === 'snow-bg' ? 'sf' : 'flake';
      for (var i = 0; i < 35; i++) {
        var f = document.createElement('div');
        f.className = cls;
        var sz = 1.5 + Math.random() * 3;
        f.style.left = Math.random() * 100 + 'vw';
        f.style.width  = sz + 'px';
        f.style.height = sz + 'px';
        f.style.animationDuration = (10 + Math.random() * 20) + 's';
        f.style.animationDelay    = -(Math.random() * 25) + 's';
        layer.appendChild(f);
      }
    })();

    // ── Snow toggle ──
    (function() {
      var layer = document.getElementById('snow-bg') || document.getElementById('snow-layer');
      var btn   = document.getElementById('snow-toggle');
      var lbl   = document.getElementById('snow-toggle-label') || document.getElementById('snow-label');
      var on    = true;
      try { on = localStorage.getItem('pd_snow') !== 'off'; } catch(e) {}
      function apply(val) {
        on = val;
        if (layer) layer.style.display = val ? '' : 'none';
        if (lbl)   lbl.textContent = val ? 'SNOW ON' : 'SNOW OFF';
        if (btn)   btn.classList.toggle('snow-off', !val);
        try { localStorage.setItem('pd_snow', val ? 'on' : 'off'); } catch(e) {}
      }
      apply(on);
      if (btn) btn.addEventListener('click', function() { apply(!on); });
    })();

    // ── Rotating taglines ──
    (function() {
      var taglines = [
        "The cold never sleeps.",
        "Even Magikarp fear what stirs beneath the ice.",
        "Something ancient has been woken. It is not happy.",
        "Roll for Sanity. Fail for flavor.",
        "Your starter is scared. You should be too.",
        "Not all blizzards are natural.",
        "The cult thought they were in control. They were wrong.",
        "It's a Pokemon world. The horror is optional.",
        "Somewhere in the snow, something remembers your name.",
        "Pack a Burn Heal. You won't need it.",
        "The storm doesn't end. It spreads.",
        "The Pokedex has no entry for what's coming.",
        "Gotta roll 'em all!",
        "The journey of a thousand miles begins with a single Poke Ball.",
        "Every trainer was a Village Sprout once. Some still are.",
        "Your Pokemon believe in you. That has to count for something.",
        "Adventure is out there - and it brought snacks!"
      ];
      var el = document.getElementById('footer-tagline');
      if (el) el.textContent = taglines[Math.floor(Math.random() * taglines.length)];
    })();

</script>

</body>
</html>
