<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Item_List — The Frostbound Harrow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:ital,wght@0,400;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --frost:      #a8d8ea;
      --frost-dark: #5b9bb5;
      --ice:        #d6eef8;
      --ghost:      #7bafc8;
      --void:       #0d1e2b;
      --white:      #1e2d3a;
      --off-white:  #172330;
      --black:      #d6eef8;
      --gray:       #7bafc8;
      --gray-lt:    #2e4a5e;
      --red:        #E3350D;
      --accent:     #3a9abf;
    }

    body {
      background: linear-gradient(175deg, #0d1e2b 0%, #0f2235 50%, #091825 100%);
      color: var(--ice);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
    }

    /* ── Snow ── */
    .snow-bg { position:fixed; inset:0; z-index:0; pointer-events:none; overflow:hidden; }
    .snow-bg .sf {
      position:absolute; top:-10px; border-radius:50%;
      background:rgba(200,230,255,0.55);
      animation:sf-fall linear infinite;
    }
    @keyframes sf-fall {
      0%   { transform:translateY(-10px) translateX(0);    opacity:0; }
      8%   { opacity:0.7; }
      92%  { opacity:0.4; }
      100% { transform:translateY(105vh) translateX(30px); opacity:0; }
    }

    /* ── Top stripe ── */
    .top-stripe {
      position:fixed; top:0; left:0; right:0; height:10px; z-index:100;
      background: linear-gradient(90deg, #1a5f7a, #3a9abf, #1a5f7a);
    }
    .top-stripe::after {
      content:''; position:absolute; bottom:-3px; left:0; right:0; height:3px;
      background:rgba(168,216,234,0.35);
    }

    /* ── Snow toggle ── */
    .snow-toggle {
      position:fixed; bottom:1.2rem; right:1.2rem; z-index:200;
      background:rgba(13,30,43,0.85);
      border:1.5px solid rgba(168,216,234,0.3); border-radius:10px;
      padding:6px 12px;
      font-family:'Press Start 2P',monospace; font-size:7px;
      color:rgba(168,216,234,0.7); cursor:pointer;
      display:flex; align-items:center; gap:6px;
      backdrop-filter:blur(6px);
      transition:border-color 0.15s, color 0.15s;
      box-shadow:0 2px 12px rgba(0,0,0,0.4);
    }
    .snow-toggle:hover { border-color:rgba(168,216,234,0.6); color:rgba(168,216,234,1); }
    .snow-toggle.snow-off { opacity:0.5; }

    @keyframes fade-up {
      from { opacity:0; transform:translateY(12px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Page layout ── */
    .page {
      position:relative; z-index:1;
      max-width:780px; margin:0 auto;
      padding:4rem 1.25rem 5rem;
    }

    /* ── Header ── */
    .header {
      display:flex; align-items:center; gap:1rem;
      margin-bottom:0.4rem;
      animation:fade-up 0.4s ease both;
    }
    .back-btn {
      background:rgba(58,154,191,0.2); color:var(--ice);
      border:1.5px solid rgba(168,216,234,0.3); border-radius:8px;
      width:36px; height:36px;
      display:flex; align-items:center; justify-content:center;
      font-size:16px; cursor:pointer; flex-shrink:0;
      transition:background 0.13s;
      box-shadow:2px 2px 0 rgba(58,154,191,0.2);
    }
    .back-btn:hover { background:var(--frost-dark); }

    .header-text h1 {
      font-family:'Press Start 2P',monospace;
      font-size:clamp(9px,2vw,14px);
      color:var(--ice);
      text-shadow:0 0 12px rgba(168,216,234,0.6), 2px 2px 0 rgba(0,20,40,0.8);
      line-height:1.5;
    }
    .header-text p { font-size:13px; color:var(--gray); font-style:italic; margin-top:4px; }

    /* ── Divider ── */
    .dex-divider {
      display:flex; align-items:center; gap:10px;
      margin:1.1rem 0 1.25rem;
      animation:fade-up 0.4s 0.05s ease both;
    }
    .dex-divider-line { flex:1; height:1px; background:linear-gradient(90deg,transparent,rgba(168,216,234,0.3),transparent); }
    .dex-divider-dot  { width:8px; height:8px; border-radius:50%; background:var(--frost-dark); border:1.5px solid var(--frost); box-shadow:0 0 6px var(--frost-dark); }
    .dex-divider-dot.small { width:5px; height:5px; }

    /* ── Search bar ── */
    .search-wrap {
      display:flex; align-items:center; gap:10px;
      background:rgba(255,255,255,0.05);
      border:1.5px solid rgba(168,216,234,0.25);
      border-radius:12px; padding:8px 14px;
      margin-bottom:0.85rem;
      animation:fade-up 0.4s 0.08s ease both;
    }
    .search-wrap i { font-size:20px; color:var(--ghost); flex-shrink:0; }
    .search-input {
      flex:1; background:none; border:none; outline:none;
      font-family:'Nunito',sans-serif; font-size:14px; color:var(--ice);
    }
    .search-input::placeholder { color:rgba(168,216,234,0.3); }
    .search-clear {
      background:none; border:none; color:var(--ghost); font-size:18px;
      cursor:pointer; padding:0; line-height:1; transition:color 0.13s;
      display:none;
    }
    .search-clear.visible { display:block; }
    .search-clear:hover { color:var(--frost); }

    /* ── Category filter pills ── */
    .filter-row {
      display:flex; gap:6px; flex-wrap:wrap; margin-bottom:1rem;
      animation:fade-up 0.4s 0.12s ease both;
    }
    .filter-btn {
      font-family:'Press Start 2P',monospace; font-size:7px;
      padding:5px 12px; border-radius:999px; cursor:pointer;
      border:1.5px solid rgba(168,216,234,0.2);
      background:rgba(255,255,255,0.05); color:var(--ghost);
      transition:background 0.13s, border-color 0.13s, color 0.13s;
    }
    .filter-btn:hover { background:rgba(168,216,234,0.1); border-color:rgba(168,216,234,0.35); color:var(--ice); }
    .filter-btn.active {
      background:var(--frost-dark); border-color:var(--frost);
      color:var(--ice);
    }

    /* ── Results count ── */
    .results-count {
      font-family:'Press Start 2P',monospace; font-size:7px;
      color:var(--ghost); margin-bottom:0.6rem;
      animation:fade-up 0.4s 0.15s ease both;
    }

    /* ── Item list container ── */
    .item-list-wrap {
      max-height: 62vh;
      overflow-y: auto;
      overflow-x: hidden;
      border: 1.5px solid rgba(168,216,234,0.15);
      border-radius: 14px;
      scrollbar-width: thin;
      scrollbar-color: var(--frost-dark) rgba(255,255,255,0.04);
      animation:fade-up 0.4s 0.18s ease both;
    }
    .item-list-wrap::-webkit-scrollbar { width:5px; }
    .item-list-wrap::-webkit-scrollbar-track { background:rgba(255,255,255,0.04); }
    .item-list-wrap::-webkit-scrollbar-thumb { background:var(--frost-dark); border-radius:999px; }

    .item-list { display:flex; flex-direction:column; }

    /* section group header */
    .item-group-header {
      padding:7px 14px;
      font-family:'Press Start 2P',monospace; font-size:7px;
      color:var(--ghost);
      background:rgba(58,154,191,0.1);
      border-bottom:1px solid rgba(168,216,234,0.1);
      border-top:1px solid rgba(168,216,234,0.1);
      position:sticky; top:0; z-index:2;
    }

    /* individual item row */
    .item-row {
      border-bottom:1px solid rgba(168,216,234,0.08);
      transition:background 0.12s;
      cursor:pointer;
    }
    .item-row:last-child { border-bottom:none; }
    .item-row:hover { background:rgba(168,216,234,0.05); }
    .item-row.open  { background:rgba(58,154,191,0.08); }

    .item-main {
      display:flex; align-items:center; gap:10px;
      padding:0.65rem 1rem;
    }
    .item-icon { font-size:18px; color:var(--ghost); flex-shrink:0; width:24px; text-align:center; }
    .item-info { flex:1; min-width:0; }
    .item-name {
      font-family:'Press Start 2P',monospace; font-size:8px;
      color:var(--ice); line-height:1.5;
    }
    .item-origin { font-size:10px; color:rgba(168,216,234,0.4); font-style:italic; margin-top:2px; }
    .item-quick { font-size:11px; color:var(--ghost); margin-top:2px; }
    .item-rarity {
      font-size:9px; font-weight:800; text-transform:uppercase;
      padding:2px 8px; border-radius:999px; flex-shrink:0;
      letter-spacing:0.06em;
    }
    .item-chevron { font-size:16px; color:var(--ghost); flex-shrink:0; transition:transform 0.2s; }
    .item-row.open .item-chevron { transform:rotate(90deg); }

    .item-add-btn {
      background:rgba(58,154,191,0.2); color:var(--ice);
      border:1.5px solid rgba(168,216,234,0.3); border-radius:7px;
      padding:5px 12px;
      font-family:'Press Start 2P',monospace; font-size:7px;
      cursor:pointer; flex-shrink:0;
      transition:background 0.13s;
      white-space:nowrap;
    }
    .item-add-btn:hover { background:var(--frost-dark); }
    .item-add-btn.added { background:rgba(95,189,88,0.3); border-color:#5FBD58; color:#5FBD58; }

    /* drawer */
    .item-drawer {
      display:none; padding:0.5rem 1rem 0.85rem 3rem;
      border-top:1px solid rgba(168,216,234,0.08);
    }
    .item-row.open .item-drawer { display:block; }
    .item-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:0.5rem; }
    .item-chip {
      font-size:10px; font-weight:700; padding:2px 9px;
      border-radius:999px; border:1.5px solid rgba(168,216,234,0.18);
      background:rgba(255,255,255,0.05); color:var(--ice);
      white-space:nowrap;
    }
    .item-chip.weapon  { background:rgba(214,40,40,0.15); border-color:rgba(214,40,40,0.4); color:#f08080; }
    .item-chip.armor   { background:rgba(59,157,212,0.15); border-color:rgba(59,157,212,0.4); color:#88c8e8; }
    .item-chip.gear    { background:rgba(95,189,88,0.12); border-color:rgba(95,189,88,0.3); color:#9de898; }
    .item-chip.tool    { background:rgba(244,210,60,0.12); border-color:rgba(244,210,60,0.3); color:#f0d060; }
    .item-chip.cost    { background:rgba(201,168,0,0.15); border-color:rgba(201,168,0,0.4); color:#f4d23c; }
    .item-chip.weight  { background:rgba(255,255,255,0.06); border-color:rgba(168,216,234,0.2); color:var(--ghost); }
    .item-desc { font-size:12px; color:var(--ghost); font-style:italic; line-height:1.55; margin-top:4px; }

    /* rarity colours */
    .r-common    { background:rgba(159,161,159,0.2); color:#9FA19F; }
    .r-uncommon  { background:rgba(95,189,88,0.2);  color:#5FBD58; }
    .r-rare      { background:rgba(59,157,212,0.2);  color:#3B9DD4; }
    .r-veryrare  { background:rgba(107,79,160,0.2);  color:#9b6ddb; }
    .r-legendary { background:rgba(255,151,65,0.2);  color:#FF9741; }

    /* empty state */
    .empty-state {
      padding:3rem 1rem; text-align:center;
      font-style:italic; color:var(--ghost); font-size:13px;
    }

    /* ── Toast ── */
    .toast {
      position:fixed; bottom:3.5rem; left:50%; transform:translateX(-50%) translateY(20px);
      background:rgba(13,30,43,0.95); color:var(--ice);
      font-family:'Press Start 2P',monospace; font-size:8px;
      padding:10px 20px; border-radius:10px;
      border:1.5px solid var(--frost-dark);
      box-shadow:0 0 16px rgba(58,154,191,0.3);
      opacity:0; pointer-events:none;
      transition:opacity 0.2s, transform 0.2s; z-index:300; white-space:nowrap;
    }
    .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

    /* ── Footer ── */
    .footer { margin-top:2rem; font-size:11px; color:var(--ghost); text-align:center; font-style:italic; }
    .footer strong { font-family:'Press Start 2P',monospace; font-size:8px; color:var(--frost-dark); font-style:normal; }

    /* scrollbar */
    * { scrollbar-width:thin; scrollbar-color:var(--frost-dark) rgba(255,255,255,0.04); }
  </style>
</head>
<body>

<div class="top-stripe"></div>
<div class="snow-bg" id="snow-bg" aria-hidden="true"></div>

<button class="snow-toggle" id="snow-toggle" aria-label="Toggle snow">
  <i class="ti ti-snowflake" aria-hidden="true"></i>
  <span id="snow-toggle-label">SNOW ON</span>
</button>

<div class="toast" id="toast"></div>

<div class="page">

  <div class="header">
    <button class="back-btn" id="back-btn" aria-label="Back to character sheet">
      <i class="ti ti-arrow-left" aria-hidden="true"></i>
    </button>
    <div class="header-text">
      <h1>Item_List</h1>
      <p>Browse &amp; add items to your inventory</p>
    </div>
  </div>

  <div class="dex-divider" aria-hidden="true">
    <div class="dex-divider-line"></div>
    <div class="dex-divider-dot small"></div>
    <div class="dex-divider-dot"></div>
    <div class="dex-divider-dot small"></div>
    <div class="dex-divider-line"></div>
  </div>

  <!-- Search -->
  <div class="search-wrap">
    <i class="ti ti-search" aria-hidden="true"></i>
    <input class="search-input" id="search-input" type="text" placeholder="Search items by name or type…" autocomplete="off" />
    <button class="search-clear" id="search-clear" aria-label="Clear search"><i class="ti ti-x"></i></button>
  </div>

  <!-- Category filters -->
  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" data-cat="all">ALL</button>
    <button class="filter-btn" data-cat="weapon">WEAPONS</button>
    <button class="filter-btn" data-cat="armor">ARMOR</button>
    <button class="filter-btn" data-cat="gear">GEAR</button>
    <button class="filter-btn" data-cat="tool">TOOLS</button>
    <button class="filter-btn" data-cat="mount">MOUNTS</button>
  </div>

  <p class="results-count" id="results-count">Loading…</p>

  <div class="item-list-wrap">
    <div class="item-list" id="item-list"></div>
  </div>

  <p class="footer"><strong>v0.1.0</strong> &nbsp;·&nbsp; <span id="footer-tagline"></span></p>
</div>

// STATE
// ══════════════════════════════════════
var currentCat    = 'all';
var currentSearch = '';
var toastTimer    = null;

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ el.classList.remove('show'); }, 2500);
}

// ── Category display names ──
var CAT_LABELS = { weapon:'Weapons', armor:'Armor', gear:'Gear', tool:'Tools', mount:'Mounts & Vehicles' };

// ── Item icon picker ──
function itemIcon(item) {
  if (item.cat === 'armor') {
    if (item.sub === 'Shield') return 'ti-shield';
    return 'ti-shirt';
  }
  if (item.cat === 'mount') return 'ti-horse';
  if (item.cat === 'tool') {
    if (item.sub === 'Musical Instruments') return 'ti-music';
    if (item.sub === 'Gaming Sets') return 'ti-dice';
    return 'ti-settings';
  }
  if (item.cat === 'weapon') {
    var n = item.name.toLowerCase();
    if (n.includes('bow') || n.includes('crossbow') || n.includes('blowgun')) return 'ti-bow-arrow';
    if (n.includes('axe') || n.includes('claw')) return 'ti-axe';
    if (n.includes('hammer') || n.includes('maul') || n.includes('mace') || n.includes('flail')) return 'ti-hammer';
    if (n.includes('staff') || n.includes('club') || n.includes('quarterstaff')) return 'ti-tool';
    if (n.includes('whip') || n.includes('net')) return 'ti-ripple';
    return 'ti-sword';
  }
  // gear
  var n = item.name.toLowerCase();
  if (n.includes('ball'))   return 'ti-circle';
  if (n.includes('rope') || n.includes('hook')) return 'ti-chain-link';
  if (n.includes('lantern') || n.includes('torch') || n.includes('candle')) return 'ti-flame';
  if (n.includes('potion') || n.includes('vial') || n.includes('flask') || n.includes('oil') || n.includes('salve')) return 'ti-droplet';
  if (n.includes('pack') || n.includes('bag') || n.includes('pouch')) return 'ti-backpack';
  if (n.includes('tent') || n.includes('bedroll')) return 'ti-tent';
  if (n.includes('book') || n.includes('tome') || n.includes('scroll') || n.includes('ink') || n.includes('pen') || n.includes('chalk')) return 'ti-book';
  if (n.includes('ration') || n.includes('food') || n.includes('cook')) return 'ti-tools-kitchen-2';
  if (n.includes('mirror') || n.includes('glass') || n.includes('spyglass')) return 'ti-eye';
  if (n.includes('compass') || n.includes('chart')) return 'ti-compass';
  if (n.includes('crowbar') || n.includes('hammer') || n.includes('piton')) return 'ti-tool';
  if (n.includes('powder') || n.includes('flash') || n.includes('repel')) return 'ti-sparkles';
  if (n.includes('incense') || n.includes('holy')) return 'ti-star';
  return 'ti-package';
}

// ── Rarity class ──
function rarityClass(r) {
  var map = { common:'r-common', uncommon:'r-uncommon', rare:'r-rare', 'very rare':'r-veryrare', legendary:'r-legendary' };
  return map[r] || 'r-common';
}

// ── Filter & render ──
function getFiltered() {
  return CATALOG.filter(function(item) {
    var catOk = currentCat === 'all' || item.cat === currentCat;
    var q = currentSearch.toLowerCase().trim();
    var searchOk = !q ||
      item.name.toLowerCase().includes(q) ||
      item.origin.toLowerCase().includes(q) ||
      item.sub.toLowerCase().includes(q) ||
      (item.damageType && item.damageType.toLowerCase().includes(q)) ||
      (item.desc && item.desc.toLowerCase().includes(q));
    return catOk && searchOk;
  });
}

function renderList() {
  var list   = document.getElementById('item-list');
  var countEl = document.getElementById('results-count');
  list.innerHTML = '';

  var filtered = getFiltered();
  countEl.textContent = filtered.length + ' ITEM' + (filtered.length !== 1 ? 'S' : '') + ' FOUND';

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">No items match your search.<br/><br/>Try a different keyword or category.</div>';
    return;
  }

  // Group by sub-category
  var groups = {};
  var groupOrder = [];
  filtered.forEach(function(item) {
    var key = item.sub;
    if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
    groups[key].push(item);
  });

  groupOrder.forEach(function(grp) {
    // Group header
    var hdr = document.createElement('div');
    hdr.className = 'item-group-header';
    hdr.textContent = grp.toUpperCase() + ' (' + groups[grp].length + ')';
    list.appendChild(hdr);

    groups[grp].forEach(function(item) {
      var row = document.createElement('div');
      row.className = 'item-row';
      row.setAttribute('data-id', item.id);

      // Quick stat summary
      var quick = '';
      if (item.damage)  quick = item.damage + ' ' + item.damageType;
      else if (item.acBase) quick = 'AC ' + item.acBase + ' · ' + item.armorType;
      else if (item.cost) quick = item.cost;

      // Chips for drawer
      var chips = '';
      if (item.damage)    chips += '<span class="item-chip weapon">' + item.damage + ' ' + item.damageType + '</span>';
      if (item.acBase)    chips += '<span class="item-chip armor">AC ' + item.acBase + ' · ' + item.armorType + '</span>';
      if (item.cost)      chips += '<span class="item-chip cost">' + item.cost + '</span>';
      if (item.weight)    chips += '<span class="item-chip weight">' + item.weight + '</span>';
      if (item.properties && item.properties !== '—') {
        item.properties.split(',').forEach(function(p) {
          chips += '<span class="item-chip ' + item.cat + '">' + p.trim() + '</span>';
        });
      }

      row.innerHTML =
        '<div class="item-main">' +
          '<i class="ti ' + itemIcon(item) + ' item-icon" aria-hidden="true"></i>' +
          '<div class="item-info">' +
            '<p class="item-name">' + item.name + '</p>' +
            '<p class="item-origin">D&D origin: ' + item.origin + '</p>' +
            (quick ? '<p class="item-quick">' + quick + '</p>' : '') +
          '</div>' +
          '<span class="item-rarity ' + rarityClass(item.rarity) + '">' + item.rarity + '</span>' +
          '<i class="ti ti-chevron-right item-chevron" aria-hidden="true"></i>' +
          '<button class="item-add-btn" data-id="' + item.id + '" aria-label="Add ' + item.name + ' to inventory">+ ADD</button>' +
        '</div>' +
        '<div class="item-drawer">' +
          '<div class="item-chips">' + chips + '</div>' +
          '<p class="item-desc">' + item.desc + '</p>' +
        '</div>';

      list.appendChild(row);
    });
  });
}

// ── Toggle row open/close ──
document.getElementById('item-list').addEventListener('click', function(e) {
  // Add button
  var addBtn = e.target.closest('.item-add-btn');
  if (addBtn) {
    e.stopPropagation();
    var id   = parseInt(addBtn.getAttribute('data-id'));
    var item = CATALOG.find(function(c){ return c.id === id; });
    if (!item) return;

    // Build inv entry
    var stats = null;
    if (item.cat === 'weapon' && item.damage) {
      stats = { category:'weapon', damage:item.damage, damageType:item.damageType, properties:item.properties || '' };
    } else if (item.cat === 'armor' && item.acBase) {
      stats = { category:'armor', ac:item.acBase, armorType:item.armorType || '', properties:item.properties || '' };
    }

    // Load existing inv state
    var invState = null;
    try { invState = JSON.parse(localStorage.getItem('pd_inv_state')); } catch(e2) {}
    if (!invState) invState = { items:[], coins:{} };
    if (!invState.items) invState.items = [];

    var existing = invState.items.find(function(i){ return i.name.toLowerCase() === item.name.toLowerCase(); });
    if (existing) {
      existing.qty = (existing.qty || 1) + 1;
    } else {
      invState.items.push({ name:item.name, qty:1, stats:stats, equipped:false });
    }
    try { localStorage.setItem('pd_inv_state', JSON.stringify(invState)); } catch(e2) {}

    addBtn.textContent = 'ADDED ✓';
    addBtn.classList.add('added');
    setTimeout(function(){ addBtn.textContent = '+ ADD'; addBtn.classList.remove('added'); }, 1800);
    toast('Added: ' + item.name);
    return;
  }

  // Row click — toggle drawer
  var row = e.target.closest('.item-row');
  if (!row) return;
  var wasOpen = row.classList.contains('open');
  // close all others
  document.querySelectorAll('.item-row.open').forEach(function(r){ r.classList.remove('open'); });
  if (!wasOpen) row.classList.add('open');
});

// ── Search ──
var searchEl = document.getElementById('search-input');
var clearBtn = document.getElementById('search-clear');

searchEl.addEventListener('input', function() {
  currentSearch = searchEl.value;
  clearBtn.classList.toggle('visible', currentSearch.length > 0);
  renderList();
});
clearBtn.addEventListener('click', function() {
  searchEl.value = '';
  currentSearch  = '';
  clearBtn.classList.remove('visible');
  searchEl.focus();
  renderList();
});

// ── Category filter ──
document.getElementById('filter-row').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  currentCat = btn.getAttribute('data-cat');
  renderList();
});
