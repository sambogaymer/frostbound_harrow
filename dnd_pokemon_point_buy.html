<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon & Dragons — Point Buy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:ital,wght@0,400;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:       #E3350D;
      --red-dark:  #b02a0a;
      --white:     #FAFAFA;
      --off-white: #F0EDE8;
      --black:     #1a1a1a;
      --gray:      #6b6b6b;
      --gray-lt:   #d4d0c8;
    }

    body {
      background-color: var(--off-white);
      color: var(--black);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
    }

    /* ── Top stripe ── */
    .top-stripe {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 10px;
      background: var(--red);
      z-index: 100;
    }
    .top-stripe::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 4px;
      background: var(--black);
    }

    /* ── Pokéball watermark ── */
    .pokeball-bg {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 420px; height: 420px;
      opacity: 0.05;
      pointer-events: none;
      animation: slow-spin 60s linear infinite;
      z-index: 0;
    }
    @keyframes slow-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 1.25rem 3rem;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.4rem;
      animation: fade-up 0.5s ease both;
    }

    .next-btn {
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 8px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      box-shadow: 2px 2px 0 #555;
      margin-left: auto;
    }
    .next-btn:hover { background: var(--red); }

    .header-text h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(9px, 2vw, 13px);
      color: var(--red);
      text-shadow: 2px 2px 0 var(--red-dark);
      line-height: 1.5;
    }
    .header-text p {
      font-size: 13px;
      color: var(--gray);
      font-style: italic;
      margin-top: 4px;
    }

    /* ── Divider ── */
    .dex-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 1.1rem 0 1.5rem;
      animation: fade-up 0.5s 0.05s ease both;
    }
    .dex-divider-line  { flex: 1; height: 2px; background: var(--black); }
    .dex-divider-dot   { width: 10px; height: 10px; border-radius: 50%; background: var(--red); border: 2px solid var(--black); }
    .dex-divider-dot.small { width: 6px; height: 6px; }

    /* ── Points remaining card ── */
    .points-card {
      background: var(--white);
      border: 2.5px solid var(--black);
      border-radius: 14px;
      box-shadow: 3px 3px 0 var(--black);
      padding: 1.25rem 1.5rem;
      text-align: center;
      margin-bottom: 1.25rem;
      animation: fade-up 0.4s 0.1s ease both;
      position: relative;
      overflow: hidden;
    }

    /* red left accent */
    .points-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: var(--red);
      border-radius: 11px 0 0 11px;
    }

    .points-label {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--gray);
      letter-spacing: 0.06em;
      margin-bottom: 0.5rem;
    }

    .points-display {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 6px;
    }

    .points-remaining {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(28px, 6vw, 42px);
      color: var(--red);
      transition: color 0.2s;
      line-height: 1;
    }
    .points-remaining.warn  { color: #c9a800; }
    .points-remaining.empty { color: var(--gray); }

    .points-sep {
      font-family: 'Press Start 2P', monospace;
      font-size: 20px;
      color: var(--gray-lt);
    }

    .points-total-num {
      font-family: 'Press Start 2P', monospace;
      font-size: 20px;
      color: var(--gray-lt);
    }

    /* progress bar */
    .points-bar-wrap {
      margin-top: 0.85rem;
      height: 8px;
      background: var(--off-white);
      border: 1.5px solid var(--black);
      border-radius: 999px;
      overflow: hidden;
    }
    .points-bar-fill {
      height: 100%;
      background: var(--red);
      border-radius: 999px;
      transition: width 0.25s ease, background 0.25s ease;
    }
    .points-bar-fill.warn  { background: #c9a800; }
    .points-bar-fill.empty { background: var(--gray-lt); }

    /* ── Stat grid ── */
    .stat-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
    }

    /* ── Stat card ── */
    .stat-card {
      background: var(--white);
      border: 2.5px solid var(--black);
      border-radius: 14px;
      box-shadow: 3px 3px 0 var(--black);
      padding: 1rem 1rem 0.9rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      position: relative;
      overflow: hidden;
      animation: fade-up 0.4s ease both;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      background: var(--stat-color);
      border-radius: 11px 0 0 11px;
    }

    .stat-card:nth-child(1) { animation-delay: 0.12s; }
    .stat-card:nth-child(2) { animation-delay: 0.18s; }
    .stat-card:nth-child(3) { animation-delay: 0.24s; }
    .stat-card:nth-child(4) { animation-delay: 0.30s; }
    .stat-card:nth-child(5) { animation-delay: 0.36s; }
    .stat-card:nth-child(6) { animation-delay: 0.42s; }

    .stat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 4px;
    }

    .stat-icon {
      width: 30px; height: 30px;
      border-radius: 8px;
      border: 2px solid var(--black);
      background: var(--stat-bg);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      color: var(--stat-color);
      flex-shrink: 0;
    }

    .stat-name {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(6px, 1.4vw, 8px);
      color: var(--black);
      line-height: 1.4;
    }

    /* value + stepper row */
    .stat-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-left: 4px;
    }

    .stat-btn {
      width: 30px; height: 30px;
      border: 2px solid var(--black);
      border-radius: 8px;
      background: var(--black);
      color: var(--white);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background 0.12s, transform 0.1s;
      line-height: 1;
      box-shadow: 2px 2px 0 #555;
    }
    .stat-btn:hover:not(:disabled) { background: var(--stat-color); }
    .stat-btn:active:not(:disabled) { transform: translate(1px,1px); box-shadow: none; }
    .stat-btn:disabled { background: var(--gray-lt); border-color: var(--gray-lt); color: #aaa; cursor: not-allowed; box-shadow: none; }

    .stat-value {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(18px, 3vw, 24px);
      color: var(--black);
      min-width: 28px;
      text-align: center;
      flex: 1;
    }

    /* cost pip row */
    .stat-cost-row {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-left: 4px;
    }

    .cost-label {
      font-size: 10px;
      color: var(--gray);
      font-style: italic;
    }

    .cost-badge {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      padding: 2px 8px;
      border-radius: 999px;
      background: var(--stat-color);
      color: #fff;
    }
    .cost-badge.dark-text { color: #333; }

    /* modifier chip */
    .stat-mod-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 5px 8px 5px 8px;
      background: var(--off-white);
      border-radius: 8px;
      border: 1px solid var(--gray-lt);
    }
    .mod-label {
      font-size: 10px;
      color: var(--gray);
      font-style: italic;
    }
    .mod-value {
      font-family: 'Press Start 2P', monospace;
      font-size: 9px;
      color: var(--stat-color);
    }

    /* ── Reset button ── */
    .reset-row {
      margin-top: 1.25rem;
      display: flex;
      justify-content: center;
      animation: fade-up 0.4s 0.5s ease both;
    }

    .reset-btn {
      background: var(--white);
      color: var(--black);
      border: 2.5px solid var(--black);
      border-radius: 10px;
      padding: 8px 22px;
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--black);
      transition: background 0.13s, transform 0.1s, box-shadow 0.1s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .reset-btn:hover { background: var(--off-white); transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--black); }
    .reset-btn:active { transform: translate(1px,1px); box-shadow: 1px 1px 0 var(--black); }

    /* ── Footer ── */
    .footer {
      margin-top: 2rem;
      font-size: 11px;
      color: var(--gray);
      text-align: center;
      font-style: italic;
    }
    .footer strong {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--red);
      font-style: normal;
    }

    /* ════════ FROST THEME ════════ */
    :root {
      --red:        #E3350D;
      --red-dark:   #b02a0a;
      --white:      #1e2d3a;
      --off-white:  #172330;
      --black:      #d6eef8;
      --gray:       #7bafc8;
      --gray-lt:    #2e4a5e;
      --frost:      #a8d8ea;
      --frost-dark: #5b9bb5;
      --ice:        #d6eef8;
      --void:       #0d1e2b;
      --void-mid:   #112233;
      --accent:     #3a9abf;
    }

    body {
      background: linear-gradient(175deg, #0d1e2b 0%, #0f2235 50%, #091825 100%) !important;
      color: var(--ice) !important;
      position: relative;
    }

    /* faint snow layer */
    .snow-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .snow-bg .sf {
      position: absolute; top: -10px; border-radius: 50%;
      background: rgba(200,230,255,0.55);
      animation: sf-fall linear infinite;
    }
    @keyframes sf-fall {
      0%   { transform: translateY(-10px) translateX(0);   opacity: 0; }
      8%   { opacity: 0.7; }
      92%  { opacity: 0.4; }
      100% { transform: translateY(105vh) translateX(30px); opacity: 0; }
    }

    /* top stripe — icy */
    .top-stripe {
      background: linear-gradient(90deg, #1a5f7a, #3a9abf, #1a5f7a) !important;
    }
    .top-stripe::after {
      background: rgba(168,216,234,0.35) !important;
    }

    /* cards / panel cards */
    .panel-card, .dnd-card, .class-row, .name-card,
    .collapse-row, .equip-panel, .dropdown-panel,
    .stat-box, .combat-box, .points-card, .stat-card,
    .class-block .class-trigger, .class-block .equip-panel,
    .inv-modal, .selected-banner, .option-group,
    .pkg-box, .hero-banner, .tab-btn, .card {
      background: rgba(255,255,255,0.04) !important;
      border-color: rgba(168,216,234,0.2) !important;
      color: var(--ice) !important;
    }

    .panel-card::before  { background: var(--frost-dark) !important; }
    .hero-banner::before { background: var(--frost-dark) !important; }
    .class-row::before, .collapse-row::before, .name-card::before { background: var(--frost-dark) !important; }
    .stat-box::before    { background: var(--sc) !important; }
    .combat-box::before  { background: var(--frost-dark) !important; }
    .points-card::before { background: var(--frost-dark) !important; }
    .stat-card::before   { background: var(--stat-color) !important; }

    /* box shadows — icy */
    .panel-card, .hero-banner, .class-row, .name-card,
    .stat-box, .combat-box, .points-card, .stat-card,
    .collapse-row, .selected-banner {
      box-shadow: 3px 3px 0 rgba(58,154,191,0.3) !important;
    }

    /* text colours */
    .panel-card-title, .class-name, .stat-mod, .cb-value,
    .hp-current, .tab-btn.active, .poke-name, .trigger-name,
    .option-group-label, .collapse-title, .hero-name,
    .points-remaining, .stat-value, .dnd-title, .main-title,
    h1, .header-text h1 {
      color: var(--ice) !important;
    }

    .hero-sub, .class-source, .collapse-subtitle, .trigger-sub,
    .card-desc, .subtitle, .cost-label, .stat-name,
    .cb-sub, .mod-label, .poke-types, .inv-item-sub,
    .footer, .class-source {
      color: var(--gray) !important;
    }

    /* inputs */
    .name-card-input, .inv-search, .notes-area, .bg-input,
    .inv-form-input, .coin-adjust-input, .hp-input,
    .stat-btn, .inv-search-wrap {
      background: rgba(255,255,255,0.06) !important;
      border-color: rgba(168,216,234,0.25) !important;
      color: var(--ice) !important;
    }
    .name-card-input:focus, .inv-search:focus,
    .notes-area:focus, .bg-input:focus, .inv-form-input:focus { border-color: var(--frost) !important; }

    /* tabs */
    .tab-btn {
      background: rgba(255,255,255,0.05) !important;
      border-color: rgba(168,216,234,0.2) !important;
      color: var(--gray) !important;
    }
    .tab-btn.active {
      background: var(--frost-dark) !important;
      color: var(--ice) !important;
      border-color: var(--frost-dark) !important;
    }
    .tab-btn:hover:not(.active) { background: rgba(168,216,234,0.1) !important; }

    /* buttons */
    .next-btn, .save-btn, .rest-btn, .manage-inv-btn,
    .reset-btn, .back-btn, .home-btn {
      background: rgba(58,154,191,0.25) !important;
      border-color: rgba(168,216,234,0.35) !important;
      color: var(--ice) !important;
      box-shadow: 2px 2px 0 rgba(58,154,191,0.2) !important;
    }
    .next-btn:hover, .save-btn:hover, .rest-btn:hover,
    .manage-inv-btn:hover, .reset-btn:hover, .home-btn:hover {
      background: var(--frost-dark) !important;
    }

    /* stat buttons (+ / -) */
    .stat-btn {
      background: rgba(58,154,191,0.3) !important;
      border-color: rgba(168,216,234,0.3) !important;
      color: var(--ice) !important;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3) !important;
    }
    .stat-btn:hover:not(:disabled) { background: var(--frost-dark) !important; }
    .stat-btn:disabled { background: rgba(255,255,255,0.05) !important; border-color: rgba(255,255,255,0.1) !important; color: rgba(255,255,255,0.2) !important; }

    /* score chips on stat bar */
    .stat-score-chip { border-color: rgba(0,0,0,0.4) !important; }

    /* stat mod row bg */
    .stat-mod-row { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.15) !important; }

    /* save button (equipment) — keep it distinct */
    .save-btn {
      background: var(--frost-dark) !important;
      border-color: var(--frost) !important;
    }
    .save-btn:hover { background: var(--accent) !important; }

    /* type badges — keep their own colors */
    .type-badge, .trigger-badge, .badge, .hero-badge,
    .card-type-badge { color: #fff !important; }

    /* inv rows */
    .inv-row, .inv-table tbody tr:hover { background: rgba(255,255,255,0.05) !important; }
    .inv-stat-drawer { background: rgba(255,255,255,0.04) !important; }
    .inv-stat-chip.prop { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--gray) !important; }

    /* prof tags */
    .prof-tag { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--ice) !important; }

    /* skill / throw rows */
    .throw-row, .sense-chip { background: rgba(255,255,255,0.05) !important; border-color: rgba(168,216,234,0.15) !important; }
    .inv-row { background: rgba(255,255,255,0.04) !important; border-color: rgba(168,216,234,0.12) !important; }

    /* pokemon rows */
    .poke-row:hover { background: rgba(168,216,234,0.07) !important; }
    .poke-row.selected { background: rgba(58,154,191,0.15) !important; border-left-color: var(--frost) !important; }
    .poke-row.selected .poke-name { color: var(--frost) !important; }

    /* class row selected */
    .class-row.selected { background: rgba(58,154,191,0.12) !important; border-color: var(--frost-dark) !important; }
    .class-row.selected .class-name { color: var(--frost) !important; }

    /* option / pkg boxes */
    .pkg-box.selectable:hover { background: rgba(168,216,234,0.08) !important; }
    .pkg-box.selectable.selected { background: rgba(58,154,191,0.15) !important; border-color: var(--frost) !important; }

    /* item pills */
    .item-pill { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--ice) !important; }
    .item-pill i { color: var(--gray) !important; }

    /* coin chips */
    .coin-chip { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; }

    /* points bar track */
    .points-bar-wrap { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; }

    /* dividers */
    .dex-divider-line { background: rgba(168,216,234,0.25) !important; }
    .dex-divider-dot  { background: var(--frost-dark) !important; border-color: var(--frost) !important; box-shadow: 0 0 6px var(--frost-dark); }

    /* section headers in table */
    .inv-section-header td { border-bottom-color: rgba(168,216,234,0.3) !important; }

    /* poke-dex numbers */
    .poke-dex { color: rgba(168,216,234,0.2) !important; }

    /* cost badge */
    .cost-badge { color: #fff !important; }

    /* equip button unselected */
    .inv-equip-btn { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.25) !important; }

    /* modal overlays */
    .crop-modal, .inv-modal {
      background: #132030 !important;
      border-color: rgba(168,216,234,0.3) !important;
    }
    .inv-modal-head { background: #132030 !important; border-bottom-color: rgba(168,216,234,0.2) !important; }
    .inv-modal-section-title { background: rgba(255,255,255,0.05) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--ice) !important; }
    .inv-modal-section-title.open { background: rgba(58,154,191,0.15) !important; }
    .coin-cur-row { background: rgba(255,255,255,0.05) !important; border-color: rgba(168,216,234,0.12) !important; }
    .coin-cur-name { color: var(--ice) !important; }

    /* scrollbars */
    * { scrollbar-color: var(--frost-dark) rgba(255,255,255,0.05); }
    *::-webkit-scrollbar-track { background: rgba(255,255,255,0.04) !important; }
    *::-webkit-scrollbar-thumb { background: var(--frost-dark) !important; }

    /* hp sep */
    .hp-sep, .hp-max, .points-sep, .points-total-num { color: rgba(168,216,234,0.35) !important; }

    /* or-sep */
    .or-sep, .or-sep-inner { color: rgba(168,216,234,0.25) !important; }

    /* selected banner */
    .selected-banner.visible { background: rgba(255,255,255,0.05) !important; }
    .banner-name { color: var(--ice) !important; }

    /* bg-modal form labels */
    .bg-field label, .inv-form-field label, .coin-adjust-col label,
    .name-card-label, .crop-zoom-label { color: var(--gray) !important; }

    /* pokeball watermark tint */
    .pokeball-bg svg path { fill: #2a7fa0 !important; }
    .pokeball-bg svg circle:first-child { stroke: rgba(168,216,234,0.3) !important; }

    /* footer strong */
    .footer strong { color: var(--frost-dark) !important; }
    /* ════════ END FROST THEME ════════ */

    /* ── Snow toggle button ── */
    .snow-toggle {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      z-index: 200;
      background: rgba(13,30,43,0.85);
      border: 1.5px solid rgba(168,216,234,0.3);
      border-radius: 10px;
      padding: 6px 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: rgba(168,216,234,0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(6px);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .snow-toggle:hover {
      border-color: rgba(168,216,234,0.6);
      color: rgba(168,216,234,1);
      background: rgba(20,45,65,0.95);
    }
    .snow-toggle.snow-off {
      opacity: 0.5;
    }
    .snow-toggle .snow-icon {
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="top-stripe"></div>
<div class="snow-bg" id="snow-bg" aria-hidden="true"></div>


  <div class="pokeball-bg" aria-hidden="true">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="96" fill="none" stroke="#1a1a1a" stroke-width="8"/>
      <path d="M 4 100 A 96 96 0 0 1 196 100 Z" fill="#E3350D"/>
      <rect x="4" y="91" width="192" height="18" fill="#1a1a1a"/>
      <circle cx="100" cy="100" r="22" fill="#1a1a1a"/>
      <circle cx="100" cy="100" r="14" fill="#FAFAFA"/>
      <circle cx="100" cy="100" r="6"  fill="#1a1a1a"/>
    </svg>
  </div>

  <div class="page">

    <div class="header">
      <div class="header-text">
        <h1>Assign Stats</h1>
        <p>Spend your 27 points across your six abilities</p>
      </div>
      <button class="next-btn" id="next-btn" aria-label="Continue to next step">
        <i class="ti ti-arrow-right" aria-hidden="true"></i>
      </button>
    </div>

    <div class="dex-divider" aria-hidden="true">
      <div class="dex-divider-line"></div>
      <div class="dex-divider-dot small"></div>
      <div class="dex-divider-dot"></div>
      <div class="dex-divider-dot small"></div>
      <div class="dex-divider-line"></div>
    </div>

    <!-- Points remaining -->
    <div class="points-card">
      <p class="points-label">POINTS REMAINING</p>
      <div class="points-display">
        <span class="points-remaining" id="pts-left">27</span>
        <span class="points-sep">/</span>
        <span class="points-total-num">27</span>
      </div>
      <div class="points-bar-wrap">
        <div class="points-bar-fill" id="pts-bar" style="width:100%"></div>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="stat-grid" id="stat-grid"></div>

    <!-- Reset -->
    <div class="reset-row">
      <button class="reset-btn" id="reset-btn">
        <i class="ti ti-refresh" aria-hidden="true"></i>
        RESET ALL
      </button>
    </div>

    <p class="footer"><strong>v0.1.0</strong> &nbsp;&middot;&nbsp; <span id="footer-tagline"></span></p>
  </div>

  <script>
    // ── D&D 5e point buy cost table ──
    // score 8→15 costs 0,1,2,3,4,5,7,9 cumulative points from base
    const COST = { 8:0, 9:1, 10:2, 11:3, 12:4, 13:5, 14:7, 15:9 };
    const MIN_SCORE = 8;
    const MAX_SCORE = 15;
    const TOTAL_POINTS = 27;

    const stats = [
      { key: 'str', name: 'Strength',     abbr: 'STR', icon: 'ti-barbell',     color: '#D62828', bg: '#fdeaea' },
      { key: 'dex', name: 'Dexterity',    abbr: 'DEX', icon: 'ti-run',         color: '#5FBD58', bg: '#edf7ec' },
      { key: 'con', name: 'Constitution', abbr: 'CON', icon: 'ti-heart',       color: '#FF9741', bg: '#fff4e8' },
      { key: 'int', name: 'Intelligence', abbr: 'INT', icon: 'ti-bulb',        color: '#3B9DD4', bg: '#e0f0ff' },
      { key: 'wis', name: 'Wisdom',       abbr: 'WIS', icon: 'ti-eye',         color: '#6B4FA0', bg: '#f2eefa' },
      { key: 'cha', name: 'Charisma',     abbr: 'CHA', icon: 'ti-star',        color: '#FF6DA3', bg: '#fff0f6' },
    ];

    // current scores
    const scores = {};
    stats.forEach(function(s) { scores[s.key] = MIN_SCORE; });

    function pointsSpent() {
      return stats.reduce(function(sum, s) { return sum + COST[scores[s.key]]; }, 0);
    }

    function pointsLeft() { return TOTAL_POINTS - pointsSpent(); }

    function modifier(score) {
      var m = Math.floor((score - 10) / 2);
      return (m >= 0 ? '+' : '') + m;
    }

    function costToRaise(key) {
      // cost to go from current score to current+1
      var cur = scores[key];
      if (cur >= MAX_SCORE) return Infinity;
      return COST[cur + 1] - COST[cur];
    }

    function costToLower(key) {
      var cur = scores[key];
      if (cur <= MIN_SCORE) return 0;
      return COST[cur] - COST[cur - 1];
    }

    // ── Build stat cards ──
    const grid = document.getElementById('stat-grid');

    stats.forEach(function(s) {
      const card = document.createElement('div');
      card.className = 'stat-card';
      card.id = 'card-' + s.key;
      card.style.setProperty('--stat-color', s.color);
      card.style.setProperty('--stat-bg', s.bg);

      card.innerHTML =
        '<div class="stat-header">' +
          '<div class="stat-icon"><i class="ti ' + s.icon + '" aria-hidden="true"></i></div>' +
          '<span class="stat-name">' + s.abbr + '<br/><span style="font-size:6px;color:var(--gray)">' + s.name.toUpperCase() + '</span></span>' +
        '</div>' +
        '<div class="stat-controls">' +
          '<button class="stat-btn" id="dec-' + s.key + '" aria-label="Decrease ' + s.name + '">−</button>' +
          '<span class="stat-value" id="val-' + s.key + '">' + MIN_SCORE + '</span>' +
          '<button class="stat-btn" id="inc-' + s.key + '" aria-label="Increase ' + s.name + '">+</button>' +
        '</div>' +
        '<div class="stat-cost-row">' +
          '<span class="cost-label">point cost:</span>' +
          '<span class="cost-badge" id="cost-' + s.key + '">0</span>' +
        '</div>' +
        '<div class="stat-mod-row">' +
          '<span class="mod-label">modifier</span>' +
          '<span class="mod-value" id="mod-' + s.key + '">−1</span>' +
        '</div>';

      grid.appendChild(card);

      // ── Hold-to-repeat helper ──
      // Fires immediately on press, then again after a delay, then rapidly
      function attachHold(btnId, action) {
        var btn = document.getElementById(btnId);
        var holdTimer  = null;
        var repeatTimer = null;

        function start() {
          action();                          // fire once immediately
          holdTimer = setTimeout(function() {
            repeatTimer = setInterval(action, 60); // then rapid-fire at 60ms
          }, 400);                           // 400ms delay before repeating
        }

        function stop() {
          clearTimeout(holdTimer);
          clearInterval(repeatTimer);
          holdTimer = null;
          repeatTimer = null;
        }

        btn.addEventListener('mousedown',  start);
        btn.addEventListener('touchstart', start, { passive: true });
        btn.addEventListener('mouseup',    stop);
        btn.addEventListener('mouseleave', stop);
        btn.addEventListener('touchend',   stop);
        btn.addEventListener('touchcancel',stop);

        // Keep plain click working for keyboard users (Enter / Space)
        btn.addEventListener('keydown', function(e) {
          if ((e.key === 'Enter' || e.key === ' ') && !holdTimer) {
            e.preventDefault();
            action();
          }
        });
      }

      attachHold('inc-' + s.key, function() {
        var next = scores[s.key] + 1;
        if (next > MAX_SCORE) return;
        var needed = COST[next] - COST[scores[s.key]];
        if (needed > pointsLeft()) return;
        scores[s.key] = next;
        refresh();
      });

      attachHold('dec-' + s.key, function() {
        if (scores[s.key] <= MIN_SCORE) return;
        scores[s.key]--;
        refresh();
      });
    });

    // ── Refresh all UI ──
    function refresh() {
      var left = pointsLeft();
      var pct  = Math.round((left / TOTAL_POINTS) * 100);

      var ptsEl  = document.getElementById('pts-left');
      var barEl  = document.getElementById('pts-bar');

      ptsEl.textContent = left;
      barEl.style.width = pct + '%';

      // colour states
      ptsEl.className = 'points-remaining' + (left === 0 ? ' empty' : left <= 5 ? ' warn' : '');
      barEl.className = 'points-bar-fill'   + (left === 0 ? ' empty' : left <= 5 ? ' warn' : '');

      stats.forEach(function(s) {
        var score = scores[s.key];
        document.getElementById('val-'  + s.key).textContent  = score;
        document.getElementById('cost-' + s.key).textContent  = COST[score];
        document.getElementById('mod-'  + s.key).textContent  = modifier(score);

        var incBtn = document.getElementById('inc-' + s.key);
        var decBtn = document.getElementById('dec-' + s.key);

        var canInc = score < MAX_SCORE && (COST[score + 1] - COST[score]) <= left;
        incBtn.disabled = !canInc;
        decBtn.disabled = score <= MIN_SCORE;
      });
    }

    refresh();

    // ── Reset ──
    document.getElementById('reset-btn').addEventListener('click', function() {
      stats.forEach(function(s) { scores[s.key] = MIN_SCORE; });
      refresh();
    });

    // ── Next — save stats to localStorage ──
    document.getElementById('next-btn').addEventListener('click', function() {
      var statObj = {};
      stats.forEach(function(s) { statObj[s.key] = scores[s.key]; });
      try { localStorage.setItem('pd_stats', JSON.stringify(statObj)); } catch(e) {}
      alert('Stats saved! Wire this button to navigate to the equipment page.');
      window.location.href = 'dnd_pokemon_equipment.html';
    });
  



    


    // ── Generate snow flakes ──
    (function() {
      var layer = document.getElementById('snow-bg') || document.getElementById('snow-layer');
      if (!layer || layer.children.length > 0) return;
      var cls = layer.id === 'snow-bg' ? 'sf' : 'flake';
      for (var i = 0; i < 35; i++) {
        var f = document.createElement('div');
        f.className = cls;
        var sz = 1.5 + Math.random() * 3;
        f.style.left = Math.random() * 100 + 'vw';
        f.style.width  = sz + 'px';
        f.style.height = sz + 'px';
        f.style.animationDuration = (10 + Math.random() * 20) + 's';
        f.style.animationDelay    = -(Math.random() * 25) + 's';
        layer.appendChild(f);
      }
    })();

    // ── Snow toggle ──
    (function() {
      var layer = document.getElementById('snow-bg') || document.getElementById('snow-layer');
      var btn   = document.getElementById('snow-toggle');
      var lbl   = document.getElementById('snow-toggle-label') || document.getElementById('snow-label');
      var on    = true;
      try { on = localStorage.getItem('pd_snow') !== 'off'; } catch(e) {}
      function apply(val) {
        on = val;
        if (layer) layer.style.display = val ? '' : 'none';
        if (lbl)   lbl.textContent = val ? 'SNOW ON' : 'SNOW OFF';
        if (btn)   btn.classList.toggle('snow-off', !val);
        try { localStorage.setItem('pd_snow', val ? 'on' : 'off'); } catch(e) {}
      }
      apply(on);
      if (btn) btn.addEventListener('click', function() { apply(!on); });
    })();

    // ── Rotating taglines ──
    (function() {
      var taglines = [
        "The cold never sleeps.",
        "Even Magikarp fear what stirs beneath the ice.",
        "Something ancient has been woken. It is not happy.",
        "Roll for Sanity. Fail for flavor.",
        "Your starter is scared. You should be too.",
        "Not all blizzards are natural.",
        "The cult thought they were in control. They were wrong.",
        "It's a Pokemon world. The horror is optional.",
        "Somewhere in the snow, something remembers your name.",
        "Pack a Burn Heal. You won't need it.",
        "The storm doesn't end. It spreads.",
        "The Pokedex has no entry for what's coming.",
        "Gotta roll 'em all!",
        "The journey of a thousand miles begins with a single Poke Ball.",
        "Every trainer was a Village Sprout once. Some still are.",
        "Your Pokemon believe in you. That has to count for something.",
        "Adventure is out there - and it brought snacks!"
      ];
      var el = document.getElementById('footer-tagline');
      if (el) el.textContent = taglines[Math.floor(Math.random() * taglines.length)];
    })();

</script>

</body>
</html>
