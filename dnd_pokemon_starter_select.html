<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pokémon & Dragons — Choose Your Starter</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:ital,wght@0,400;0,700;0,800;1,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red:       #E3350D;
      --red-dark:  #b02a0a;
      --white:     #FAFAFA;
      --off-white: #F0EDE8;
      --black:     #1a1a1a;
      --gray:      #6b6b6b;
      --gray-lt:   #d4d0c8;

      /* type colours */
      --normal:    #9FA19F;
      --fire:      #FF9741;
      --water:     #3B9DD4;
      --grass:     #5FBD58;
      --electric:  #c9a800;
      --electric-badge: #F4D23C;
      --ice:       #74CEC0;
      --fighting:  #D62828;
      --poison:    #9B5FC0;
      --ground:    #C9B560;
      --flying:    #748FC4;
      --psychic:   #FF6DA3;
      --bug:       #8CB230;
      --rock:      #A38C21;
      --ghost:     #6B4FA0;
      --steel:     #9EB7B8;
    }

    body {
      background-color: var(--off-white);
      color: var(--black);
      font-family: 'Nunito', sans-serif;
      min-height: 100vh;
    }

    /* ── Top stripe ── */
    .top-stripe {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 10px;
      background: var(--red);
      z-index: 100;
    }
    .top-stripe::after {
      content: '';
      position: absolute;
      bottom: -4px; left: 0; right: 0;
      height: 4px;
      background: var(--black);
    }

    /* ── Pokéball watermark ── */
    .pokeball-bg {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 420px; height: 420px;
      opacity: 0.05;
      pointer-events: none;
      animation: slow-spin 60s linear infinite;
      z-index: 0;
    }
    @keyframes slow-spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

    /* ── Page layout ── */
    .page {
      position: relative;
      z-index: 1;
      max-width: 680px;
      margin: 0 auto;
      padding: 4rem 1.25rem 3rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 0.4rem;
      animation: fade-up 0.5s ease both;
    }

    .next-btn {
      background: var(--black);
      color: var(--white);
      border: none;
      border-radius: 8px;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.15s;
      box-shadow: 2px 2px 0 #555;
      margin-left: auto;
    }
    .next-btn:hover { background: var(--red); }

    .header-text h1 {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(9px, 2vw, 13px);
      color: var(--red);
      text-shadow: 2px 2px 0 var(--red-dark);
      line-height: 1.5;
    }
    .header-text p {
      font-size: 13px;
      color: var(--gray);
      font-style: italic;
      margin-top: 4px;
    }

    /* ── Divider ── */
    .dex-divider {
      display: flex; align-items: center; gap: 10px;
      margin: 1.1rem 0 1.5rem;
      animation: fade-up 0.5s 0.05s ease both;
    }
    .dex-divider-line  { flex: 1; height: 2px; background: var(--black); }
    .dex-divider-dot   { width: 10px; height: 10px; border-radius: 50%; background: var(--red); border: 2px solid var(--black); }
    .dex-divider-dot.small { width: 6px; height: 6px; }

    /* ── Collapsible trigger row ── */
    .collapse-row {
      background: var(--white);
      border: 2.5px solid var(--black);
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1rem;
      cursor: pointer;
      box-shadow: 3px 3px 0 var(--black);
      transition: transform 0.13s ease, box-shadow 0.13s ease, border-radius 0.2s ease;
      position: relative;
      overflow: hidden;
      animation: fade-up 0.4s 0.1s ease both;
      user-select: none;
    }

    .collapse-row:hover {
      transform: translate(-2px, -2px);
      box-shadow: 5px 5px 0 var(--black);
    }
    .collapse-row.open {
      border-radius: 14px 14px 0 0;
      border-bottom-color: var(--gray-lt);
      transform: none;
      box-shadow: 3px 0 0 var(--black), -0px 0 0 var(--black);
    }

    /* left accent strip */
    .collapse-row::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 5px;
      border-radius: 11px 0 0 11px;
      background: var(--red);
    }
    .collapse-row.open::before { border-radius: 11px 0 0 0; }

    .collapse-icon-wrap {
      width: 52px; height: 52px;
      border-radius: 10px;
      border: 2px solid var(--black);
      background: #fdeaea;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
      color: var(--red);
      flex-shrink: 0;
      margin-left: 6px;
    }

    .collapse-info { flex: 1; }

    .collapse-title {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(8px, 1.8vw, 11px);
      color: var(--black);
      line-height: 1.5;
    }

    .collapse-subtitle {
      font-size: 12px;
      color: var(--gray);
      font-style: italic;
      margin-top: 4px;
    }

    .collapse-chevron {
      font-size: 20px;
      color: var(--red);
      flex-shrink: 0;
      transition: transform 0.25s ease;
    }
    .collapse-row.open .collapse-chevron { transform: rotate(90deg); }

    /* ── Dropdown panel ── */
    .dropdown-panel {
      background: var(--white);
      border: 2.5px solid var(--black);
      border-top: none;
      border-radius: 0 0 14px 14px;
      box-shadow: 3px 3px 0 var(--black);
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.35s ease;
    }
    .dropdown-panel.open { max-height: 500px; }

    .pokemon-list {
      display: flex;
      flex-direction: column;
      padding: 6px 0 8px;
      /* Show exactly 6 rows (~62px each) then scroll */
      max-height: 372px;
      overflow-y: auto;
      overflow-x: hidden;
      /* Styled scrollbar — Webkit */
      scrollbar-width: thin;
      scrollbar-color: var(--red) var(--off-white);
    }
    .pokemon-list::-webkit-scrollbar { width: 6px; }
    .pokemon-list::-webkit-scrollbar-track { background: var(--off-white); border-radius: 999px; }
    .pokemon-list::-webkit-scrollbar-thumb { background: var(--red); border-radius: 999px; border: 1px solid var(--black); }

    /* ── Individual Pokémon row ── */
    .poke-row {
      display: flex;
      align-items: center;
      gap: 0.9rem;
      padding: 0.6rem 1.1rem 0.6rem 1.5rem;
      cursor: pointer;
      transition: background 0.12s ease;
      border-left: 4px solid transparent;
      position: relative;
    }

    .poke-row:hover {
      background: var(--off-white);
      border-left-color: var(--type-color);
    }

    .poke-row.selected {
      background: #fff4f2;
      border-left-color: var(--red);
    }
    .poke-row.selected .poke-name { color: var(--red); }

    /* Pokédex number */
    .poke-dex {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--gray-lt);
      width: 30px;
      flex-shrink: 0;
      text-align: right;
    }

    /* type colour dot */
    .poke-select-sprite {
      width: 36px; height: 36px;
      image-rendering: pixelated; flex-shrink: 0;
      object-fit: contain; opacity: 0;
      transition: opacity .2s;
    }
    .poke-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--type-color);
      border: 1.5px solid var(--black);
      flex-shrink: 0;
    }

    .poke-info { flex: 1; }

    .poke-name {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(7px, 1.6vw, 10px);
      color: var(--black);
      line-height: 1.5;
      transition: color 0.12s;
    }

    .poke-types {
      display: flex;
      gap: 5px;
      margin-top: 4px;
    }

    .type-pill {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 1px 8px;
      border-radius: 999px;
      color: #fff;
    }
    .type-pill.dark-text { color: #333; }

    .poke-check {
      font-size: 18px;
      color: var(--red);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }
    .poke-row.selected .poke-check { opacity: 1; }

    /* divider between rows */
    .poke-row + .poke-row {
      border-top: 0.5px solid #ece9e3;
    }

    /* ── Selected summary banner ── */
    .selected-banner {
      margin-top: 1.25rem;
      background: var(--white);
      border: 2.5px solid var(--black);
      border-radius: 14px;
      box-shadow: 3px 3px 0 var(--black);
      padding: 0.85rem 1.1rem;
      display: none;
      align-items: center;
      gap: 0.85rem;
      animation: fade-up 0.3s ease both;
    }
    .selected-banner.visible { display: flex; }

    .banner-dot {
      width: 14px; height: 14px;
      border-radius: 50%;
      border: 2px solid var(--black);
      flex-shrink: 0;
    }

    .banner-text { flex: 1; }
    .banner-label {
      font-size: 10px;
      color: var(--gray);
      font-style: italic;
    }
    .banner-name {
      font-family: 'Press Start 2P', monospace;
      font-size: 10px;
      color: var(--black);
      margin-top: 3px;
    }

    .banner-clear {
      background: none;
      border: none;
      color: var(--gray);
      font-size: 18px;
      cursor: pointer;
      padding: 0;
      line-height: 1;
      transition: color 0.12s;
    }
    .banner-clear:hover { color: var(--red); }

    /* ── Footer ── */
    .footer {
      margin-top: 2rem;
      font-size: 11px;
      color: var(--gray);
      text-align: center;
      font-style: italic;
    }
    .footer strong {
      font-family: 'Press Start 2P', monospace;
      font-size: 8px;
      color: var(--red);
      font-style: normal;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ════════ FROST THEME ════════ */
    :root {
      --red:        #E3350D;
      --red-dark:   #b02a0a;
      --white:      #1e2d3a;
      --off-white:  #172330;
      --black:      #d6eef8;
      --gray:       #7bafc8;
      --gray-lt:    #2e4a5e;
      --frost:      #a8d8ea;
      --frost-dark: #5b9bb5;
      --ice:        #d6eef8;
      --void:       #0d1e2b;
      --void-mid:   #112233;
      --accent:     #3a9abf;
    }

    body {
      background: linear-gradient(175deg, #0d1e2b 0%, #0f2235 50%, #091825 100%) !important;
      color: var(--ice) !important;
      position: relative;
    }

    /* faint snow layer */
    .snow-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .snow-bg .sf {
      position: absolute; top: -10px; border-radius: 50%;
      background: rgba(200,230,255,0.55);
      animation: sf-fall linear infinite;
    }
    @keyframes sf-fall {
      0%   { transform: translateY(-10px) translateX(0);   opacity: 0; }
      8%   { opacity: 0.7; }
      92%  { opacity: 0.4; }
      100% { transform: translateY(105vh) translateX(30px); opacity: 0; }
    }

    /* top stripe — icy */
    .top-stripe {
      background: linear-gradient(90deg, #1a5f7a, #3a9abf, #1a5f7a) !important;
    }
    .top-stripe::after {
      background: rgba(168,216,234,0.35) !important;
    }

    /* cards / panel cards */
    .panel-card, .dnd-card, .class-row, .name-card,
    .collapse-row, .equip-panel, .dropdown-panel,
    .stat-box, .combat-box, .points-card, .stat-card,
    .class-block .class-trigger, .class-block .equip-panel,
    .inv-modal, .selected-banner, .option-group,
    .pkg-box, .hero-banner, .tab-btn, .card {
      background: rgba(255,255,255,0.04) !important;
      border-color: rgba(168,216,234,0.2) !important;
      color: var(--ice) !important;
    }

    .panel-card::before  { background: var(--frost-dark) !important; }
    .hero-banner::before { background: var(--frost-dark) !important; }
    .class-row::before, .collapse-row::before, .name-card::before { background: var(--frost-dark) !important; }
    .stat-box::before    { background: var(--sc) !important; }
    .combat-box::before  { background: var(--frost-dark) !important; }
    .points-card::before { background: var(--frost-dark) !important; }
    .stat-card::before   { background: var(--stat-color) !important; }

    /* box shadows — icy */
    .panel-card, .hero-banner, .class-row, .name-card,
    .stat-box, .combat-box, .points-card, .stat-card,
    .collapse-row, .selected-banner {
      box-shadow: 3px 3px 0 rgba(58,154,191,0.3) !important;
    }

    /* text colours */
    .panel-card-title, .class-name, .stat-mod, .cb-value,
    .hp-current, .tab-btn.active, .poke-name, .trigger-name,
    .option-group-label, .collapse-title, .hero-name,
    .points-remaining, .stat-value, .dnd-title, .main-title,
    h1, .header-text h1 {
      color: var(--ice) !important;
    }

    .hero-sub, .class-source, .collapse-subtitle, .trigger-sub,
    .card-desc, .subtitle, .cost-label, .stat-name,
    .cb-sub, .mod-label, .poke-types, .inv-item-sub,
    .footer, .class-source {
      color: var(--gray) !important;
    }

    /* inputs */
    .name-card-input, .inv-search, .notes-area, .bg-input,
    .inv-form-input, .coin-adjust-input, .hp-input,
    .stat-btn, .inv-search-wrap {
      background: rgba(255,255,255,0.06) !important;
      border-color: rgba(168,216,234,0.25) !important;
      color: var(--ice) !important;
    }
    .name-card-input:focus, .inv-search:focus,
    .notes-area:focus, .bg-input:focus, .inv-form-input:focus { border-color: var(--frost) !important; }

    /* tabs */
    .tab-btn {
      background: rgba(255,255,255,0.05) !important;
      border-color: rgba(168,216,234,0.2) !important;
      color: var(--gray) !important;
    }
    .tab-btn.active {
      background: var(--frost-dark) !important;
      color: var(--ice) !important;
      border-color: var(--frost-dark) !important;
    }
    .tab-btn:hover:not(.active) { background: rgba(168,216,234,0.1) !important; }

    /* buttons */
    .next-btn, .save-btn, .rest-btn, .manage-inv-btn,
    .reset-btn, .back-btn, .home-btn {
      background: rgba(58,154,191,0.25) !important;
      border-color: rgba(168,216,234,0.35) !important;
      color: var(--ice) !important;
      box-shadow: 2px 2px 0 rgba(58,154,191,0.2) !important;
    }
    .next-btn:hover, .save-btn:hover, .rest-btn:hover,
    .manage-inv-btn:hover, .reset-btn:hover, .home-btn:hover {
      background: var(--frost-dark) !important;
    }

    /* stat buttons (+ / -) */
    .stat-btn {
      background: rgba(58,154,191,0.3) !important;
      border-color: rgba(168,216,234,0.3) !important;
      color: var(--ice) !important;
      box-shadow: 2px 2px 0 rgba(0,0,0,0.3) !important;
    }
    .stat-btn:hover:not(:disabled) { background: var(--frost-dark) !important; }
    .stat-btn:disabled { background: rgba(255,255,255,0.05) !important; border-color: rgba(255,255,255,0.1) !important; color: rgba(255,255,255,0.2) !important; }

    /* score chips on stat bar */
    .stat-score-chip { border-color: rgba(0,0,0,0.4) !important; }

    /* stat mod row bg */
    .stat-mod-row { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.15) !important; }

    /* save button (equipment) — keep it distinct */
    .save-btn {
      background: var(--frost-dark) !important;
      border-color: var(--frost) !important;
    }
    .save-btn:hover { background: var(--accent) !important; }

    /* type badges — keep their own colors */
    .type-badge, .trigger-badge, .badge, .hero-badge,
    .card-type-badge { color: #fff !important; }

    /* inv rows */
    .inv-row, .inv-table tbody tr:hover { background: rgba(255,255,255,0.05) !important; }
    .inv-stat-drawer { background: rgba(255,255,255,0.04) !important; }
    .inv-stat-chip.prop { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--gray) !important; }

    /* prof tags */
    .prof-tag { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--ice) !important; }

    /* skill / throw rows */
    .throw-row, .sense-chip { background: rgba(255,255,255,0.05) !important; border-color: rgba(168,216,234,0.15) !important; }
    .inv-row { background: rgba(255,255,255,0.04) !important; border-color: rgba(168,216,234,0.12) !important; }

    /* pokemon rows */
    .poke-row:hover { background: rgba(168,216,234,0.07) !important; }
    .poke-row.selected { background: rgba(58,154,191,0.15) !important; border-left-color: var(--frost) !important; }
    .poke-row.selected .poke-name { color: var(--frost) !important; }

    /* class row selected */
    .class-row.selected { background: rgba(58,154,191,0.12) !important; border-color: var(--frost-dark) !important; }
    .class-row.selected .class-name { color: var(--frost) !important; }

    /* option / pkg boxes */
    .pkg-box.selectable:hover { background: rgba(168,216,234,0.08) !important; }
    .pkg-box.selectable.selected { background: rgba(58,154,191,0.15) !important; border-color: var(--frost) !important; }

    /* item pills */
    .item-pill { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--ice) !important; }
    .item-pill i { color: var(--gray) !important; }

    /* coin chips */
    .coin-chip { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; }

    /* points bar track */
    .points-bar-wrap { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.2) !important; }

    /* dividers */
    .dex-divider-line { background: rgba(168,216,234,0.25) !important; }
    .dex-divider-dot  { background: var(--frost-dark) !important; border-color: var(--frost) !important; box-shadow: 0 0 6px var(--frost-dark); }

    /* section headers in table */
    .inv-section-header td { border-bottom-color: rgba(168,216,234,0.3) !important; }

    /* poke-dex numbers */
    .poke-dex { color: rgba(168,216,234,0.2) !important; }

    /* cost badge */
    .cost-badge { color: #fff !important; }

    /* equip button unselected */
    .inv-equip-btn { background: rgba(255,255,255,0.06) !important; border-color: rgba(168,216,234,0.25) !important; }

    /* modal overlays */
    .crop-modal, .inv-modal {
      background: #132030 !important;
      border-color: rgba(168,216,234,0.3) !important;
    }
    .inv-modal-head { background: #132030 !important; border-bottom-color: rgba(168,216,234,0.2) !important; }
    .inv-modal-section-title { background: rgba(255,255,255,0.05) !important; border-color: rgba(168,216,234,0.2) !important; color: var(--ice) !important; }
    .inv-modal-section-title.open { background: rgba(58,154,191,0.15) !important; }
    .coin-cur-row { background: rgba(255,255,255,0.05) !important; border-color: rgba(168,216,234,0.12) !important; }
    .coin-cur-name { color: var(--ice) !important; }

    /* scrollbars */
    * { scrollbar-color: var(--frost-dark) rgba(255,255,255,0.05); }
    *::-webkit-scrollbar-track { background: rgba(255,255,255,0.04) !important; }
    *::-webkit-scrollbar-thumb { background: var(--frost-dark) !important; }

    /* hp sep */
    .hp-sep, .hp-max, .points-sep, .points-total-num { color: rgba(168,216,234,0.35) !important; }

    /* or-sep */
    .or-sep, .or-sep-inner { color: rgba(168,216,234,0.25) !important; }

    /* selected banner */
    .selected-banner.visible { background: rgba(255,255,255,0.05) !important; }
    .banner-name { color: var(--ice) !important; }

    /* bg-modal form labels */
    .bg-field label, .inv-form-field label, .coin-adjust-col label,
    .name-card-label, .crop-zoom-label { color: var(--gray) !important; }

    /* pokeball watermark tint */
    .pokeball-bg svg path { fill: #2a7fa0 !important; }
    .pokeball-bg svg circle:first-child { stroke: rgba(168,216,234,0.3) !important; }

    /* footer strong */
    .footer strong { color: var(--frost-dark) !important; }
    /* ════════ END FROST THEME ════════ */

    /* ── Snow toggle button ── */
    .snow-toggle {
      position: fixed;
      bottom: 1.2rem;
      right: 1.2rem;
      z-index: 200;
      background: rgba(13,30,43,0.85);
      border: 1.5px solid rgba(168,216,234,0.3);
      border-radius: 10px;
      padding: 6px 12px;
      font-family: 'Press Start 2P', monospace;
      font-size: 7px;
      color: rgba(168,216,234,0.7);
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      backdrop-filter: blur(6px);
      transition: border-color 0.15s, color 0.15s, background 0.15s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }
    .snow-toggle:hover {
      border-color: rgba(168,216,234,0.6);
      color: rgba(168,216,234,1);
      background: rgba(20,45,65,0.95);
    }
    .snow-toggle.snow-off {
      opacity: 0.5;
    }
    .snow-toggle .snow-icon {
      font-size: 14px;
    }
  </style>
  <script src="dnd_pokemon_data.js"></script>
</head>
<body>

  <div class="top-stripe"></div>
<div class="snow-bg" id="snow-bg" aria-hidden="true"></div>


  <div class="pokeball-bg" aria-hidden="true">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <circle cx="100" cy="100" r="96" fill="none" stroke="#1a1a1a" stroke-width="8"/>
      <path d="M 4 100 A 96 96 0 0 1 196 100 Z" fill="#E3350D"/>
      <rect x="4" y="91" width="192" height="18" fill="#1a1a1a"/>
      <circle cx="100" cy="100" r="22" fill="#1a1a1a"/>
      <circle cx="100" cy="100" r="14" fill="#FAFAFA"/>
      <circle cx="100" cy="100" r="6"  fill="#1a1a1a"/>
    </svg>
  </div>

  <div class="page">

    <!-- Header -->
    <div class="header">
      <div class="header-text">
        <h1>Choose Your Starter</h1>
        <p>Every trainer begins with a partner Pokémon</p>
      </div>
      <button class="next-btn" id="next-btn" aria-label="Continue to next step">
        <i class="ti ti-arrow-right" aria-hidden="true"></i>
      </button>
    </div>

    <div class="dex-divider" aria-hidden="true">
      <div class="dex-divider-line"></div>
      <div class="dex-divider-dot small"></div>
      <div class="dex-divider-dot"></div>
      <div class="dex-divider-dot small"></div>
      <div class="dex-divider-line"></div>
    </div>

    <!-- Collapsible block -->
    <div class="collapse-row" id="collapse-trigger" role="button" tabindex="0" aria-expanded="false" aria-controls="dropdown-panel">
      <div class="collapse-icon-wrap">
        <i class="ti ti-pokeball" aria-hidden="true"></i>
      </div>
      <div class="collapse-info">
        <p class="collapse-title">STARTER POKÉMON</p>
        <p class="collapse-subtitle">Tap to browse available partners</p>
      </div>
      <i class="ti ti-chevron-right collapse-chevron" aria-hidden="true"></i>
    </div>

    <div class="dropdown-panel" id="dropdown-panel" role="listbox" aria-label="Starter Pokémon options">
      <div class="pokemon-list" id="pokemon-list"></div>
    </div>

    <!-- Selected summary -->
    <div class="selected-banner" id="selected-banner" aria-live="polite">
      <div class="banner-dot" id="banner-dot"></div>
      <div class="banner-text">
        <p class="banner-label">Your starter</p>
        <p class="banner-name" id="banner-name"></p>
      </div>
      <button class="banner-clear" id="banner-clear" aria-label="Clear selection">
        <i class="ti ti-x" aria-hidden="true"></i>
      </button>
    </div>

    <p class="footer"><strong>v0.1.0</strong> &nbsp;&middot;&nbsp; <span id="footer-tagline"></span></p>
  </div>

  <script>
    // Wait for DOM to be fully ready
    document.addEventListener('DOMContentLoaded', function() {

    // ── Pokémon data ──
    var TC = (typeof TYPE_COLORS !== 'undefined') ? TYPE_COLORS : {
      Normal:'#9FA19F', Fire:'#FF9741', Water:'#3B9DD4', Grass:'#5FBD58',
      Electric:'#F4D23C', Ice:'#74CEC0', Fighting:'#D62828', Poison:'#9B5FC0',
      Ground:'#A38C21', Flying:'#748FC8', Psychic:'#FF6DA3', Bug:'#8CB230',
      Rock:'#A38C21', Ghost:'#5B5466', Dragon:'#4C6AB4', Dark:'#595761',
      Steel:'#8C8C9A', Fairy:'#F4BDC9'
    };
    function tc(type) { return TC[type] || '#9FA19F'; }

    var pokemon = [
      { name:'Bidoof',       dex:'#399', types:['Normal'] },
      { name:'Starly',       dex:'#396', types:['Normal','Flying'] },
      { name:'Shinx',        dex:'#403', types:['Electric'] },
      { name:'Budew',        dex:'#406', types:['Grass','Poison'] },
      { name:'Kricketot',    dex:'#401', types:['Bug'] },
      { name:'Wurmple',      dex:'#265', types:['Bug'] },
      { name:'Geodude',      dex:'#074', types:['Rock','Ground'] },
      { name:'Magikarp',     dex:'#129', types:['Water'] },
      { name:'Zubat',        dex:'#041', types:['Poison','Flying'] },
      { name:'Psyduck',      dex:'#054', types:['Water'] },
      { name:'Goldeen',      dex:'#118', types:['Water'] },
      { name:'Hoothoot',     dex:'#163', types:['Normal','Flying'] },
      { name:'Pikachu',      dex:'#025', types:['Electric'] },
      { name:'Eevee',        dex:'#133', types:['Normal'] },
      { name:'Ralts',        dex:'#280', types:['Psychic','Fairy'] },
      { name:'Buizel',       dex:'#418', types:['Water'] },
      { name:'Combee',       dex:'#415', types:['Bug','Flying'] },
      { name:'Snorunt',      dex:'#361', types:['Ice'] },
      { name:'Snover',       dex:'#459', types:['Grass','Ice'] },
      { name:'Chatot',       dex:'#441', types:['Normal','Flying'] },
      { name:'Pachirisu',    dex:'#417', types:['Electric'] },
      { name:'Aipom',        dex:'#190', types:['Normal'] },
      { name:'Riolu',        dex:'#447', types:['Fighting'] },
      { name:'Stunky',       dex:'#434', types:['Poison','Dark'] },
      { name:'Croagunk',     dex:'#453', types:['Poison','Fighting'] },
      { name:'H. Growlithe', dex:'#058', types:['Fire','Rock'] },
      { name:'Slugma',       dex:'#218', types:['Fire'] },
    ].map(function(p) {
      return {
        name:  p.name,
        dex:   p.dex,
        types: p.types,
        colors: p.types.map(function(t) { return tc(t); }),
        darkText: p.types.map(function(t) { return t === 'Electric'; })
      };
    });

    // ── Safe sprite loader (works with or without dnd_pokemon_data.js) ──
    var spriteCache = {};
    var NAME_MAP_LOCAL = { 'h. growlithe':'growlithe-hisui' };
    function loadSprite(name, imgEl) {
      try {
        var key = NAME_MAP_LOCAL[name.toLowerCase()] ||
                  name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,'');
        if (spriteCache[key]) { imgEl.src = spriteCache[key]; imgEl.style.opacity='1'; return; }
        fetch('https://pokeapi.co/api/v2/pokemon/' + key)
          .then(function(r){ return r.json(); })
          .then(function(d){
            var url = d && d.sprites && (
              (d.sprites.versions && d.sprites.versions['generation-v'] &&
               d.sprites.versions['generation-v']['black-white'] &&
               d.sprites.versions['generation-v']['black-white'].animated &&
               d.sprites.versions['generation-v']['black-white'].animated.front_default) ||
              d.sprites.front_default);
            if (url) { spriteCache[key]=url; imgEl.src=url; imgEl.style.opacity='1'; }
          })
          .catch(function(){});
      } catch(e) {}
    }

    // pill bg for Electric
    var electricBadgeBg = '#F4D23C';

    var selectedName = null;

    var trigger   = document.getElementById('collapse-trigger');
    var panel     = document.getElementById('dropdown-panel');
    var list      = document.getElementById('pokemon-list');
    var banner    = document.getElementById('selected-banner');
    var bannerName = document.getElementById('banner-name');
    var bannerDot  = document.getElementById('banner-dot');
    var clearBtn   = document.getElementById('banner-clear');

    // ── Build Pokémon rows ──
    pokemon.forEach(function(p) {
      var row = document.createElement('div');
      row.className = 'poke-row';
      row.setAttribute('role', 'option');
      row.setAttribute('tabindex', '0');
      row.setAttribute('aria-selected', 'false');
      row.setAttribute('aria-label', p.name);
      row.style.setProperty('--type-color', p.colors[0]);

      var pillsHtml = p.types.map(function(t, i) {
        var bg   = (t === 'Electric') ? electricBadgeBg : p.colors[i] || p.colors[0];
        var dark = (t === 'Electric') ? ' dark-text' : '';
        return '<span class="type-pill' + dark + '" style="background:' + bg + '">' + t + '</span>';
      }).join('');

      var safeId = p.name.replace(/[^a-z0-9]/gi, '-');
      row.innerHTML =
        '<span class="poke-dex">' + p.dex + '</span>' +
        '<img class="poke-select-sprite" id="sel-sprite-' + safeId + '" src="" alt="' + p.name + '" style="opacity:0" />' +
        '<div class="poke-info">' +
          '<p class="poke-name">' + p.name.toUpperCase() + '</p>' +
          '<div class="poke-types">' + pillsHtml + '</div>' +
        '</div>' +
        '<i class="ti ti-check poke-check" aria-hidden="true"></i>';

      row.addEventListener('click', function() { selectPokemon(p, row); });
      row.addEventListener('keydown', function(e) {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); selectPokemon(p, row); }
      });

      list.appendChild(row);

      // Load sprite safely
      var img = document.getElementById('sel-sprite-' + safeId);
      if (img) loadSprite(p.name, img);
    });

    // ── Select a Pokémon ──
    function selectPokemon(p, row) {
      document.querySelectorAll('.poke-row.selected').forEach(function(r) {
        r.classList.remove('selected');
        r.setAttribute('aria-selected', 'false');
      });
      if (selectedName === p.name) {
        selectedName = null;
        banner.classList.remove('visible');
        try { localStorage.removeItem('pd_selected_starter'); } catch(e) {}
      } else {
        selectedName = p.name;
        row.classList.add('selected');
        row.setAttribute('aria-selected', 'true');
        bannerName.textContent = p.name.toUpperCase();
        bannerDot.style.background = p.colors[0];
        banner.classList.add('visible');
        try { localStorage.setItem('pd_selected_starter', p.name); } catch(e) {}
      }
    }

    // ── Clear button ──
    clearBtn.addEventListener('click', function() {
      selectedName = null;
      document.querySelectorAll('.poke-row.selected').forEach(function(r) {
        r.classList.remove('selected');
        r.setAttribute('aria-selected', 'false');
      });
      banner.classList.remove('visible');
      try { localStorage.removeItem('pd_selected_starter'); } catch(e) {}
    });

    // ── Collapse toggle ──
    function togglePanel() {
      var isOpen = trigger.classList.contains('open');
      trigger.classList.toggle('open', !isOpen);
      panel.classList.toggle('open', !isOpen);
      trigger.setAttribute('aria-expanded', String(!isOpen));
    }
    trigger.addEventListener('click', togglePanel);
    trigger.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); togglePanel(); }
    });

    // ── Next button ──
    document.getElementById('next-btn').addEventListener('click', function() {
      if (!selectedName) {
        alert('Please choose a starter Pokémon first!');
        return;
      }
      window.location.href = 'dnd_pokemon_point_buy.html';
    });

    // ── Snow ──
    (function() {
      var layer = document.getElementById('snow-bg') || document.getElementById('snow-layer');
      if (!layer || layer.children.length > 0) return;
      var cls = layer.id === 'snow-bg' ? 'sf' : 'flake';
      for (var i = 0; i < 35; i++) {
        var f = document.createElement('div');
        f.className = cls;
        var sz = 1.5 + Math.random() * 3;
        f.style.left = Math.random() * 100 + 'vw';
        f.style.width  = sz + 'px';
        f.style.height = sz + 'px';
        f.style.animationDuration = (10 + Math.random() * 20) + 's';
        f.style.animationDelay    = -(Math.random() * 25) + 's';
        layer.appendChild(f);
      }
    })();
    (function() {
      var layer = document.getElementById('snow-bg') || document.getElementById('snow-layer');
      var btn = document.getElementById('snow-toggle');
      var lbl = document.getElementById('snow-toggle-label') || document.getElementById('snow-label');
      var on  = true;
      try { on = localStorage.getItem('pd_snow') !== 'off'; } catch(e) {}
      function apply(val) {
        on = val;
        if (layer) layer.style.display = val ? '' : 'none';
        if (lbl)   lbl.textContent = val ? 'SNOW ON' : 'SNOW OFF';
        if (btn)   btn.classList.toggle('snow-off', !val);
        try { localStorage.setItem('pd_snow', val ? 'on' : 'off'); } catch(e) {}
      }
      apply(on);
      if (btn) btn.addEventListener('click', function() { apply(!on); });
    })();

    // ── Taglines ──
    (function() {
      var taglines = [
        "The cold never sleeps.",
        "Even Magikarp fear what stirs beneath the ice.",
        "Something ancient has been woken. It is not happy.",
        "Roll for Sanity. Fail for flavor.",
        "Your starter is scared. You should be too.",
        "Not all blizzards are natural.",
        "The cult thought they were in control. They were wrong.",
        "It's a Pokemon world. The horror is optional.",
        "Somewhere in the snow, something remembers your name.",
        "Pack a Burn Heal. You won't need it.",
        "The storm doesn't end. It spreads.",
        "The Pokedex has no entry for what's coming.",
        "Gotta roll 'em all!",
        "The journey of a thousand miles begins with a single Poke Ball.",
        "Every trainer was a Village Sprout once. Some still are.",
        "Your Pokemon believe in you. That has to count for something.",
        "Adventure is out there - and it brought snacks!"
      ];
      var el = document.getElementById('footer-tagline');
      if (el) el.textContent = taglines[Math.floor(Math.random() * taglines.length)];
    })();

    }); // end DOMContentLoaded
  </script>

</body>
</html>
