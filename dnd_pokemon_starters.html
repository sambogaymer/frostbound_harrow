  <title>Pokédex — The Frostbound Harrow</title>

  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--frost:#a8d8ea;--fd:#5b9bb5;--ice:#d6eef8;--ghost:#7bafc8;--void:#0d1e2b;--gray:#7bafc8;--gray-lt:#2e4a5e;--red:#E3350D;--accent:#3a9abf}
    body{background:linear-gradient(175deg,#0d1e2b 0%,#0f2235 50%,#091825 100%);color:var(--ice);font-family:'Nunito',sans-serif;min-height:100vh}
    .snow-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
    .snow-bg .sf{position:absolute;top:-10px;border-radius:50%;background:rgba(200,230,255,.55);animation:sf-fall linear infinite}
    @keyframes sf-fall{0%{transform:translateY(-10px) translateX(0);opacity:0}8%{opacity:.7}92%{opacity:.4}100%{transform:translateY(105vh) translateX(30px);opacity:0}}
    .top-stripe{position:fixed;top:0;left:0;right:0;height:10px;z-index:100;background:linear-gradient(90deg,#1a5f7a,#3a9abf,#1a5f7a)}
    .top-stripe::after{content:'';position:absolute;bottom:-3px;left:0;right:0;height:3px;background:rgba(168,216,234,.35)}
    .snow-toggle{position:fixed;bottom:1.2rem;right:1.2rem;z-index:200;background:rgba(13,30,43,.85);border:1.5px solid rgba(168,216,234,.3);border-radius:10px;padding:6px 12px;font-family:'Press Start 2P',monospace;font-size:7px;color:rgba(168,216,234,.7);cursor:pointer;display:flex;align-items:center;gap:6px;backdrop-filter:blur(6px);box-shadow:0 2px 12px rgba(0,0,0,.4)}
    .snow-toggle:hover{border-color:rgba(168,216,234,.6);color:rgba(168,216,234,1)}
    .snow-toggle.snow-off{opacity:.5}
    @keyframes fade-up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
    .page{position:relative;z-index:1;max-width:780px;margin:0 auto;padding:4rem 1.25rem 5rem}
    .header{display:flex;align-items:center;gap:1rem;margin-bottom:.4rem;animation:fade-up .4s ease both}
    .back-btn{background:rgba(58,154,191,.2);color:var(--ice);border:1.5px solid rgba(168,216,234,.3);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;transition:background .13s}
    .back-btn:hover{background:var(--fd)}
    .header-text h1{font-family:'Press Start 2P',monospace;font-size:clamp(9px,2vw,14px);color:var(--ice);text-shadow:0 0 12px rgba(168,216,234,.6),2px 2px 0 rgba(0,20,40,.8);line-height:1.5}
    .header-text p{font-size:13px;color:var(--gray);font-style:italic;margin-top:4px}
    .dex-divider{display:flex;align-items:center;gap:10px;margin:1.1rem 0 1.25rem;animation:fade-up .4s .05s ease both}
    .dex-divider-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(168,216,234,.3),transparent)}
    .dex-divider-dot{width:8px;height:8px;border-radius:50%;background:var(--fd);border:1.5px solid var(--frost);box-shadow:0 0 6px var(--fd)}
    .dex-divider-dot.small{width:5px;height:5px}
    /* Search */
    .search-wrap{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.05);border:1.5px solid rgba(168,216,234,.25);border-radius:12px;padding:8px 14px;margin-bottom:.85rem;animation:fade-up .4s .08s ease both}
    .search-wrap i{font-size:20px;color:var(--ghost);flex-shrink:0}
    .search-input{flex:1;background:none;border:none;outline:none;font-family:'Nunito',sans-serif;font-size:14px;color:var(--ice)}
    .search-input::placeholder{color:rgba(168,216,234,.3)}
    /* Filter pills */
    .filter-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1rem;animation:fade-up .4s .1s ease both}
    .filter-btn{font-family:'Press Start 2P',monospace;font-size:7px;padding:5px 12px;border-radius:999px;cursor:pointer;border:1.5px solid rgba(168,216,234,.2);background:rgba(255,255,255,.05);color:var(--ghost);transition:background .13s,border-color .13s,color .13s}
    .filter-btn:hover{background:rgba(168,216,234,.1);color:var(--ice)}
    .filter-btn.active{background:var(--fd);border-color:var(--frost);color:var(--ice)}
    .results-count{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--ghost);margin-bottom:.6rem}
    /* Pokemon list */
    .poke-list-wrap{border:1.5px solid rgba(168,216,234,.15);border-radius:14px;overflow:hidden;animation:fade-up .4s .15s ease both}
    .poke-row{border-bottom:1px solid rgba(168,216,234,.08);cursor:pointer;transition:background .12s}
    .poke-row:last-child{border-bottom:none}
    .poke-row:hover{background:rgba(168,216,234,.05)}
    .poke-row.open{background:rgba(58,154,191,.08)}
    .poke-main{display:flex;align-items:center;gap:12px;padding:.75rem 1rem}
    .poke-dex{font-family:'Press Start 2P',monospace;font-size:8px;color:rgba(168,216,234,.25);width:36px;flex-shrink:0;text-align:right}
    .poke-sprite{width:40px;height:40px;image-rendering:pixelated;flex-shrink:0;object-fit:contain;opacity:0;transition:opacity .2s}

    .poke-types{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
    .type-badge{font-size:9px;font-weight:800;padding:2px 8px;border-radius:999px;color:#fff;letter-spacing:.04em}
    .poke-chevron{font-size:16px;color:var(--ghost);transition:transform .2s;flex-shrink:0}
    .poke-row.open .poke-chevron{transform:rotate(90deg)}

    .stat-drawer{display:none;border-top:1px solid rgba(168,216,234,.1)}
    .poke-row.open .stat-drawer{display:block}
    .stat-block{padding:1rem 1.25rem 1.25rem;background:rgba(255,255,255,.02)}
    /* Stat block header */
    .sb-name{font-family:'Press Start 2P',monospace;font-size:11px;color:var(--frost);text-shadow:0 0 10px rgba(168,216,234,.4);margin-bottom:2px}
    .sb-meta{font-size:12px;color:var(--ghost);font-style:italic;margin-bottom:.75rem}
    .sb-divider{height:2px;background:linear-gradient(90deg,var(--fd),transparent);margin:.6rem 0}
    .sb-divider.thin{height:1px;background:rgba(168,216,234,.2)}
    /* Core stats row */
    .sb-core{display:flex;gap:6px;flex-wrap:wrap;margin:.5rem 0}
    .sb-core-item{background:rgba(255,255,255,.05);border:1px solid rgba(168,216,234,.15);border-radius:8px;padding:6px 10px;text-align:center;min-width:52px;flex:1}
    .sb-core-label{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--ghost);margin-bottom:3px}
    .sb-core-val{font-size:14px;font-weight:800;color:var(--ice)}
    /* Ability scores */
    .sb-abilities{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin:.75rem 0}
    .sb-ability{background:rgba(255,255,255,.04);border:1px solid rgba(168,216,234,.12);border-radius:8px;padding:6px 4px;text-align:center}
    .sb-ability-name{font-family:'Press Start 2P',monospace;font-size:6px;color:var(--ghost);margin-bottom:3px}
    .sb-ability-score{font-size:13px;font-weight:800;color:var(--ice)}
    .sb-ability-mod{font-size:10px;color:var(--fd)}
    /* Text sections */
    .sb-section{margin:.6rem 0}
    .sb-section-label{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--ghost);margin-bottom:.35rem;display:flex;align-items:center;gap:6px}
    .sb-section-label i{font-size:12px}
    .sb-text{font-size:12px;color:var(--ghost);line-height:1.65}
    .sb-text strong{color:var(--ice)}
    /* Actions */
    .sb-action{background:rgba(255,255,255,.04);border:1px solid rgba(168,216,234,.1);border-radius:8px;padding:.6rem .85rem;margin-bottom:.5rem}
    .sb-action-name{font-family:'Press Start 2P',monospace;font-size:7px;color:var(--frost);margin-bottom:.3rem;display:flex;align-items:center;gap:8px}
    .sb-action-type{font-size:9px;font-family:'Nunito',sans-serif;font-weight:700;padding:1px 7px;border-radius:999px;color:#fff}
    .sb-action-desc{font-size:12px;color:var(--ghost);line-height:1.6}
    .sb-action-desc strong{color:var(--ice)}
    /* Traits */
    .sb-trait{margin-bottom:.5rem}
    .sb-trait-name{font-size:12px;font-weight:800;color:var(--ice);font-style:italic}
    .sb-trait-desc{font-size:12px;color:var(--ghost);line-height:1.6}
    /* Empty */
    .empty-state{padding:3rem 1rem;text-align:center;font-style:italic;color:var(--ghost);font-size:13px}
    /* Footer */
    .footer{margin-top:2rem;font-size:11px;color:var(--ghost);text-align:center;font-style:italic}
    .footer strong{font-family:'Press Start 2P',monospace;font-size:8px;color:var(--fd);font-style:normal}
    *{scrollbar-width:thin;scrollbar-color:var(--fd) rgba(255,255,255,.04)}

  var m = Math.floor((score - 10) / 2);

  'giratina (altered)':'giratina-altered','giratina (origin)':'giratina-origin',
};


function fetchSprite(name, cb) {
  var key = (NAME_MAP[name.toLowerCase()] || name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,''));
  if (spriteCache[key]) { cb(spriteCache[key]); return; }
  fetch('https://pokeapi.co/api/v2/pokemon/' + key)
    .then(function(r){ return r.json(); })
    .then(function(d){
      var url = d && d.sprites && (
        (d.sprites.versions && d.sprites.versions['generation-v'] &&
         d.sprites.versions['generation-v']['black-white'] &&
         d.sprites.versions['generation-v']['black-white'].animated &&
         d.sprites.versions['generation-v']['black-white'].animated.front_default) ||
        d.sprites.front_default);
      if (url) { spriteCache[key] = url; cb(url); }
    })
    .catch(function(){
      var alt = name.toLowerCase().replace(/[^a-z0-9]/g,'');
      if (alt !== key) {
        fetch('https://pokeapi.co/api/v2/pokemon/' + alt)
          .then(function(r){ return r.json(); })
          .then(function(d){ var u=d&&d.sprites&&d.sprites.front_default; if(u){spriteCache[key]=u;cb(u);} })
          .catch(function(){});
      }
    });
}

      {name:'Stone Axe', type:'Weapon', color:'#A38C21', desc:'Melee: +8 to hit, reach 10 ft. <strong>Hit:</strong> 18 (3d8+5) slashing. Kleavor scatters stone shards in a 10 ft radius: any creature entering the area takes 7 (2d6) piercing damage for 1 minute.'},
      {name:'X-Scissor', type:'Weapon', color:'#8CB230', desc:'Melee: +8 to hit, reach 10 ft. <strong>Hit:</strong> 23 (4d8+5) slashing. Critical on 19-20.'},
      {name:'Rock Blast', type:'Weapon', color:'#A38C21', desc:'Ranged: +8 to hit, 40 ft. Roll 1d4+1 strikes. Each: 8 (1d6+5) bludgeoning.'},
    ],
    flavor:'Kleavor evolved from Scyther that were exposed to the unique mineral-rich environment of ancient Hisui. Their scythes hardened into stone axes over generations. They are extremely territorial and have been found carving deep gouges into mountain faces. Researchers believe this is territorial marking. The gouges are 3 metres deep. In solid granite.'
  },

  // ── Ursaluna ──,
  {
    name:'Ursaluna', dex:'#901', types:['Ground','Normal'],
    size:'Huge beast', cr:'9', xp:5000,
    ac:15, hp:'14d12+70', hpAvg:161, speed:'40 ft',
    str:26, dex_stat:10, con:20, int:6, wis:12, cha:8,
    saves:'Str +11, Con +8', skills:'Athletics +11, Perception +4',
    senses:'Tremorsense 60 ft, Passive Perception 14', languages:'--',
    traits:[
      {name:'Guts', desc:'While Poisoned, Burned, or Paralyzed, Ursaluna\'s attacks deal +7 damage.'},
      {name:'Thick Fat', desc:'Resistance to Fire and Ice damage.'},
      {name:'Ground Sense', desc:'Ursaluna can locate any object or creature underground within 300 ft. It always knows where buried things are.'}
    ],
    actions:[
      {name:'Multiattack', type:'Special', color:'#9FA19F', desc:'Ursaluna makes two attacks.'},
      {name:'Headlong Rush', type:'Weapon', color:'#A38C21', desc:'Melee: +11 to hit, reach 10 ft. <strong>Hit:</strong> 26 (4d8+8) bludgeoning + 9 (2d8) ground. Ursaluna\'s DEF reduced by 2 until end of next turn.'},
      {name:'High Horsepower', type:'Weapon', color:'#A38C21', desc:'Melee: +11 to hit. <strong>Hit:</strong> 28 (4d10+6) bludgeoning. DC 19 STR or knocked Prone and pushed 15 ft.'},
      {name:'Earthquake', type:'Special', color:'#A38C21', desc:'All creatures on ground within 25 ft: DC 19 DEX or 28 (8d6) bludgeoning. Half on save.'},
    ],
    flavor:'Ursaluna evolved under the light of a full moon in the Hisui region. They use the mud that coats their body to sense vibrations underground with extraordinary precision. Old Hisuian records describe Ursaluna being used to locate missing people and buried ruins. They were never wrong. They were also not always gentle about the digging.'
  },

  // ── H. Sneasel / Sneasler ──,
  {
    name:'Basculegion', dex:'#902', types:['Water','Ghost'],
    size:'Large beast', cr:'7', xp:2900,
    ac:14, hp:'11d10+44', hpAvg:104, speed:'5 ft, swim 60 ft',
    str:20, dex_stat:16, con:18, int:6, wis:12, cha:10,
    saves:'Str +8, Con +7', skills:'Athletics +8',
    senses:'Darkvision 60 ft, Passive Perception 11', languages:'--',
    traits:[
      {name:'Swift Swim', desc:'Swim speed doubles in rain.'},
      {name:'Moxie', desc:'Each time Basculegion reduces a creature to 0 HP, its attack rolls increase by +2 until end of encounter (max +8).'},
      {name:'Spirit Possession', desc:'Basculegion carries the spirits of those who died before it. When it drops to half HP, these spirits burst forth: all creatures within 15 ft take 14 (4d6) necrotic damage, DC 15 CON half.'}
    ],
    actions:[
      {name:'Multiattack', type:'Special', color:'#9FA19F', desc:'Basculegion makes two attacks.'},
      {name:'Wave Crash', type:'Spell', color:'#3B9DD4', desc:'Melee: +8 to hit. <strong>Hit:</strong> 22 (4d8+4) bludgeoning + 9 (2d8) cold. Basculegion takes 7 (2d6) recoil. DC 15 STR or knocked Prone.'},
      {name:'Hex', type:'Spell', color:'#5B5466', desc:'Ranged: +6 to hit, 60 ft. <strong>Hit:</strong> 14 (4d6) necrotic, or 28 (8d6) if target has a condition. The spirit passengers surge forward.'},
    ],
    flavor:'Basculegion became host to the souls of Basculin who died before completing their upstream migration. The weight of those spirits transformed it. It carries them now, not as a burden but as fuel. Every kill feeds both Basculegion and the hundreds of souls it carries. They have been waiting a long time. They are patient. They are not peaceful.'
  },

  // ── H. Voltorb / H. Electrode ──,
  {
    name:'Sneasler', dex:'#903', types:['Fighting','Poison'],
    size:'Large beast', cr:'7', xp:2900,
    ac:15, hp:'11d10+44', hpAvg:104, speed:'50 ft, climb 50 ft',
    str:16, dex_stat:22, con:18, int:8, wis:12, cha:12,
    saves:'Dex +9', skills:'Acrobatics +9, Athletics +6, Stealth +9',
    senses:'Darkvision 60 ft, Passive Perception 11', languages:'--',
    traits:[
      {name:'Poison Touch', desc:'Creatures hit by Sneasler\'s melee attacks: DC 15 CON or Badly Poisoned.'},
      {name:'Unburden', desc:'When Sneasler drops or loses a held item, its speed increases by 20 ft until end of encounter.'}
    ],
    actions:[
      {name:'Multiattack', type:'Special', color:'#9FA19F', desc:'Sneasler makes three attacks.'},
      {name:'Dire Claw', type:'Weapon', color:'#D62828', desc:'Melee: +9 to hit. <strong>Hit:</strong> 14 (2d6+7) slashing. DC 15 CON or roll 1d6: 1-2 Paralyzed (end of next turn), 3-4 Badly Poisoned, 5-6 Drowsy (disadvantage on all rolls for 1 minute).'},
      {name:'Close Combat', type:'Weapon', color:'#D62828', desc:'Melee: +9 to hit. <strong>Hit:</strong> 21 (4d6+7) bludgeoning. Until start of Sneasler\'s next turn, it has -2 AC.'},
    ],
    flavor:'Sneasler are solitary, aggressive, and among the most capable climbers of any Pokemon in existence. They scale sheer ice walls at a run without slowing. They have been known to adopt trainers they respect and carry them over terrain that would otherwise be impassable. The adoption is not negotiable. Sneasler decides.'
  },

  // ── Basculegion ──,
  {
    name:'Enamorus', dex:'#905', types:['Fairy','Flying'],
    size:'Large legendary', cr:'14', xp:11500,
    ac:17, hp:'18d10+72', hpAvg:171, speed:'20 ft, fly 90 ft',
    str:12, dex_stat:22, con:18, int:16, wis:20, cha:24,
    saves:'Dex +11, Wis +10, Cha +12', skills:'Persuasion +12, Insight +10, Perception +10',
    senses:'Truesight 60 ft, Passive Perception 20', languages:'Common, Fairy',
    traits:[
      {name:'Healer', desc:'At the start of each of Enamorus\'s turns, one friendly creature within 30 ft of its choice regains 10 HP.'},
      {name:'Contrary', desc:'Any effect that would reduce Enamorus\'s stats instead increases them by the same amount, and vice versa.'},
      {name:'Legendary Resistance', desc:'If Enamorus fails a saving throw, it can choose to succeed instead. Three times per day.'}
    ],
    actions:[
      {name:'Multiattack', type:'Special', color:'#9FA19F', desc:'Enamorus makes two attacks.'},
      {name:'Springtide Storm', type:'Spell', color:'#F4BDC9', desc:'All creatures in a 20 ft radius: DC 20 CHA or 28 (4d10+6) fairy damage and Charmed by Enamorus for 1 minute. Charmed creatures will not attack it. Half damage on save.'},
      {name:'Dazzling Gleam', type:'Spell', color:'#F4BDC9', desc:'All creatures within 20 ft: DC 20 DEX or 28 (8d6) radiant. Half on save.'},
      {name:'Mystical Fire', type:'Spell', color:'#FF9741', desc:'Ranged: +12 to hit, 80 ft. <strong>Hit:</strong> 22 (4d10) fire. Target\'s spell attack bonus reduced by 3 until end of encounter.'},
    ],
    flavor:'Enamorus is the spirit of spring and love in the Hisui region, the counterpart to the Forces of Nature that govern storms, landslides, and cold fronts. Its arrival heralds the thaw. In the Harrow, spring has not come. Enamorus has been trying. Whatever is holding the cold in place is strong enough to resist a legendary. The party may need to help from the other side.'
  },


];

</script>
</head>
<body>
<div class="top-stripe"></div>
<div class="snow-bg" id="snow-bg" aria-hidden="true"></div>
<button class="snow-toggle" id="snow-toggle"><i class="ti ti-snowflake"></i><span id="snow-toggle-label">SNOW ON</span></button>

<div class="page">
  <div class="header">
    <button class="back-btn" onclick="history.back()" aria-label="Back"><i class="ti ti-arrow-left"></i></button>
    <div class="header-text">
      <h1>Sinnoh Pokédex</h1>
      <p>D&D 5e companion stats for every available starter</p>
    </div>
  </div>

  <div class="dex-divider">
    <div class="dex-divider-line"></div>
    <div class="dex-divider-dot small"></div>
    <div class="dex-divider-dot"></div>
    <div class="dex-divider-dot small"></div>
    <div class="dex-divider-line"></div>
  </div>

  <div class="search-wrap">
    <i class="ti ti-search"></i>
    <input class="search-input" id="search" type="text" placeholder="Search by name or type…" autocomplete="off"/>
  </div>

  <div class="filter-row" id="filter-row">
    <button class="filter-btn active" data-type="all">ALL</button>
    <button class="filter-btn" data-type="Fire">FIRE</button>
    <button class="filter-btn" data-type="Water">WATER</button>
    <button class="filter-btn" data-type="Grass">GRASS</button>
    <button class="filter-btn" data-type="Normal">NORMAL</button>
    <button class="filter-btn" data-type="Poison">POISON</button>
    <button class="filter-btn" data-type="Flying">FLYING</button>
    <button class="filter-btn" data-type="Electric">ELECTRIC</button>
    <button class="filter-btn" data-type="Psychic">PSYCHIC</button>
    <button class="filter-btn" data-type="Fighting">FIGHTING</button>
    <button class="filter-btn" data-type="Rock">ROCK</button>
    <button class="filter-btn" data-type="Ice">ICE</button>
    <button class="filter-btn" data-type="Ground">GROUND</button>
    <button class="filter-btn" data-type="Ghost">GHOST</button>
    <button class="filter-btn" data-type="Dragon">DRAGON</button>
    <button class="filter-btn" data-type="Steel">STEEL</button>
    <button class="filter-btn" data-type="Dark">DARK</button>
    <button class="filter-btn" data-type="Fairy">FAIRY</button>
    <button class="filter-btn" data-type="Ground">GROUND</button>
    <button class="filter-btn" data-type="Bug">BUG</button>
    <button class="filter-btn" data-type="Ghost">GHOST</button>
    <button class="filter-btn" data-type="Dragon">DRAGON</button>
    <button class="filter-btn" data-type="Dark">DARK</button>
    <button class="filter-btn" data-type="Steel">STEEL</button>
    <button class="filter-btn" data-type="Fairy">FAIRY</button>
    <button class="filter-btn" data-type="Legendary">LEGENDARY</button>
    <button class="filter-btn" data-type="Mythic">MYTHIC</button>
  </div>

  <p class="results-count" id="results-count">Loading…</p>
  <div class="poke-list-wrap"><div id="poke-list"></div></div>

  <p class="footer"><strong>v0.1.0</strong> &nbsp;·&nbsp; <span id="footer-tagline"></span></p>
</div>

<script>
// ══════════════════════════════════════
// TYPE COLORS
// ══════════════════════════════════════


// ══════════════════════════════════════
// STARTER DATA
// ══════════════════════════════════════


// ══════════════════════════════════════
// RENDER
// ══════════════════════════════════════
var currentType = 'all';
var currentSearch = '';

function getFiltered() {
  return STARTERS.filter(function(p) {
    var typeOk = currentType === 'all' || p.types.indexOf(currentType) !== -1;
    var q = currentSearch.toLowerCase();
    var searchOk = !q || p.name.toLowerCase().includes(q) || p.types.join(' ').toLowerCase().includes(q) || p.flavor.toLowerCase().includes(q);
    return typeOk && searchOk;
  });
}

// ── Sprite fetching ──
var _spriteCache = {};
var _nameMap = {'h. growlithe':'growlithe-hisui','h. zorua':'zorua-hisui','h. zoroark':'zoroark-hisui','h. voltorb':'voltorb-hisui','h. electrode':'electrode-hisui','h. braviary':'braviary-hisui','h. sneasel':'sneasel-hisui','mime jr.':'mime-jr','mr. mime':'mr-mime','shaymin (land)':'shaymin','shaymin (sky)':'shaymin-sky','giratina (altered)':'giratina-altered','giratina (origin)':'giratina-origin'};
function _loadSprite(name, imgEl) {
  try {
    var key = _nameMap[name.toLowerCase()] || name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/-+$/,'');
    if (_spriteCache[key]) { imgEl.src=_spriteCache[key]; imgEl.classList.add('loaded'); return; }
    fetch('https://pokeapi.co/api/v2/pokemon/'+key)
      .then(function(r){return r.json();})
      .then(function(d){
        var u=d&&d.sprites&&((d.sprites.versions&&d.sprites.versions['generation-v']&&d.sprites.versions['generation-v']['black-white']&&d.sprites.versions['generation-v']['black-white'].animated&&d.sprites.versions['generation-v']['black-white'].animated.front_default)||d.sprites.front_default);
        if(u){_spriteCache[key]=u;imgEl.src=u;imgEl.classList.add('loaded');}
      }).catch(function(){});
  } catch(e) {}
}

function renderList() {
  var list = document.getElementById('poke-list');
  var countEl = document.getElementById('results-count');
  list.innerHTML = '';
  var filtered = getFiltered();
  countEl.textContent = filtered.length + ' POKÉMON FOUND';

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">No starters match your search.</div>';
    return;
  }

  filtered.forEach(function(p, i) {
    var row = document.createElement('div');
    row.className = 'poke-row';

    var typeBadges = p.types.map(function(t) {
      return '<span class="type-badge" style="background:' + (TYPE_COLORS[t] || '#9FA19F') + '">' + t.toUpperCase() + '</span>';
    }).join('');

    // Build actions HTML
    var actionsHtml = p.actions.map(function(a) {
      return '<div class="sb-action">' +
        '<p class="sb-action-name">' + a.name +
          '<span class="sb-action-type" style="background:' + a.color + '">' + a.type + '</span>' +
        '</p>' +
        '<p class="sb-action-desc">' + a.desc + '</p>' +
      '</div>';
    }).join('');

    // Build traits HTML
    var traitsHtml = p.traits.map(function(t) {
      return '<div class="sb-trait"><span class="sb-trait-name">' + t.name + '. </span><span class="sb-trait-desc">' + t.desc + '</span></div>';
    }).join('');

    var mod = function(s) { return modStr(s); };

    row.innerHTML =
      '<div class="poke-main">' +
        '<span class="poke-dex">' + p.dex + '</span>' +
        '<img class="poke-sprite" id="dex-sprite-' + i + '" src="" alt="' + p.name + '" />' +
        '<div class="poke-name-wrap">' +
          '<p class="poke-name">' + p.name.toUpperCase() + '</p>' +
          '<div class="poke-types">' + typeBadges + '</div>' +
        '</div>' +
        '<i class="ti ti-chevron-right poke-chevron"></i>' +
      '</div>' +
      '<div class="stat-drawer">' +
        '<div class="stat-block">' +
          '<p class="sb-name">' + p.name + '</p>' +
          '<p class="sb-meta">' + p.size + ', unaligned — CR ' + p.cr + ' (' + p.xp + ' XP)</p>' +
          '<div class="sb-divider"></div>' +
          '<div class="sb-core">' +
            '<div class="sb-core-item"><div class="sb-core-label">ARMOR CLASS</div><div class="sb-core-val">' + p.ac + '</div></div>' +
            '<div class="sb-core-item"><div class="sb-core-label">HIT POINTS</div><div class="sb-core-val">' + p.hpAvg + ' <span style="font-size:11px;color:var(--ghost)">(' + p.hp + ')</span></div></div>' +
            '<div class="sb-core-item"><div class="sb-core-label">SPEED</div><div class="sb-core-val" style="font-size:11px">' + p.speed + '</div></div>' +
          '</div>' +
          '<div class="sb-divider thin"></div>' +
          '<div class="sb-abilities">' +
            '<div class="sb-ability"><div class="sb-ability-name">STR</div><div class="sb-ability-score">' + p.str + '</div><div class="sb-ability-mod">' + mod(p.str) + '</div></div>' +
            '<div class="sb-ability"><div class="sb-ability-name">DEX</div><div class="sb-ability-score">' + p.dex_stat + '</div><div class="sb-ability-mod">' + mod(p.dex_stat) + '</div></div>' +
            '<div class="sb-ability"><div class="sb-ability-name">CON</div><div class="sb-ability-score">' + p.con + '</div><div class="sb-ability-mod">' + mod(p.con) + '</div></div>' +
            '<div class="sb-ability"><div class="sb-ability-name">INT</div><div class="sb-ability-score">' + p.int + '</div><div class="sb-ability-mod">' + mod(p.int) + '</div></div>' +
            '<div class="sb-ability"><div class="sb-ability-name">WIS</div><div class="sb-ability-score">' + p.wis + '</div><div class="sb-ability-mod">' + mod(p.wis) + '</div></div>' +
            '<div class="sb-ability"><div class="sb-ability-name">CHA</div><div class="sb-ability-score">' + p.cha + '</div><div class="sb-ability-mod">' + mod(p.cha) + '</div></div>' +
          '</div>' +
          '<div class="sb-divider thin"></div>' +
          '<div class="sb-section">' +
            (p.saves ? '<p class="sb-text"><strong>Saving Throws</strong> ' + p.saves + '</p>' : '') +
            (p.skills ? '<p class="sb-text"><strong>Skills</strong> ' + p.skills + '</p>' : '') +
            '<p class="sb-text"><strong>Senses</strong> ' + p.senses + '</p>' +
            '<p class="sb-text"><strong>Languages</strong> ' + p.languages + '</p>' +
          '</div>' +
          '<div class="sb-divider"></div>' +
          '<div class="sb-section">' +
            '<p class="sb-section-label"><i class="ti ti-sparkles"></i>TRAITS</p>' +
            traitsHtml +
          '</div>' +
          '<div class="sb-divider thin"></div>' +
          '<div class="sb-section">' +
            '<p class="sb-section-label"><i class="ti ti-sword"></i>ACTIONS</p>' +
            actionsHtml +
          '</div>' +
          '<div class="sb-divider thin"></div>' +
          '<div class="sb-section">' +
            '<p class="sb-section-label"><i class="ti ti-book"></i>FLAVOR</p>' +
            '<p class="sb-text" style="font-style:italic">' + p.flavor + '</p>' +
          '</div>' +
        '</div>' +
      '</div>';

    // Toggle open/close on click
    row.querySelector('.poke-main').addEventListener('click', function() {
      var wasOpen = row.classList.contains('open');
      document.querySelectorAll('.poke-row.open').forEach(function(r) { r.classList.remove('open'); });
      if (!wasOpen) row.classList.add('open');
    });

    list.appendChild(row);

    // Fetch sprite after appending
    (function(pokeName, idx) {
      var img = document.getElementById('dex-sprite-' + idx);
      // Use shared fetchSprite if available, otherwise use local _loadSprite
      var loader = (typeof fetchSprite === 'function') ? fetchSprite : null;
      if (img) {
        if (loader) {
          loader(pokeName, function(url) { img.src = url; img.classList.add('loaded'); });
        } else {
          _loadSprite(pokeName, img);
        }
      }
    })(p.name, i);
  });
}

// Search
document.getElementById('search').addEventListener('input', function() {
  currentSearch = this.value;
  renderList();
});

// Filter
document.getElementById('filter-row').addEventListener('click', function(e) {
  var btn = e.target.closest('.filter-btn');
  if (!btn) return;
  document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
  btn.classList.add('active');
  currentType = btn.getAttribute('data-type');
  renderList();
});

// Snow
(function() {
  var layer = document.getElementById('snow-bg');
  for (var i = 0; i < 30; i++) {
    var f = document.createElement('div'); f.className = 'sf';
    var sz = 1.2 + Math.random() * 2.5;
    f.style.left = Math.random() * 100 + 'vw';
    f.style.width = sz + 'px'; f.style.height = sz + 'px';
    f.style.animationDuration = (14 + Math.random() * 22) + 's';
    f.style.animationDelay = -(Math.random() * 30) + 's';
    layer.appendChild(f);
  }
  var btn = document.getElementById('snow-toggle'), lbl = document.getElementById('snow-toggle-label'), on = true;
  try { on = localStorage.getItem('pd_snow') !== 'off'; } catch(e) {}
  function apply(v) { on=v; layer.style.display=v?'':'none'; lbl.textContent=v?'SNOW ON':'SNOW OFF'; btn.classList.toggle('snow-off',!v); try{localStorage.setItem('pd_snow',v?'on':'off');}catch(e){} }
  apply(on);
  btn.addEventListener('click', function() { apply(!on); });
})();

// Taglines
(function() {
  var taglines = [
    "The cold never sleeps.",
    "Even Magikarp fear what stirs beneath the ice.",
    "Something ancient has been woken. It is not happy.",
    "Roll for Sanity. Fail for flavor.",
    "Your starter is scared. You should be too.",
    "Not all blizzards are natural.",
    "The cult thought they were in control. They were wrong.",
    "It's a Pokemon world. The horror is optional.",
    "Somewhere in the snow, something remembers your name.",
    "Pack a Burn Heal. You won\'t need it.",
    "The storm doesn\'t end. It spreads.",
    "The Pokedex has no entry for what\'s coming.",
    "Gotta roll 'em all!",
    "The journey of a thousand miles begins with a single Poke Ball.",
    "Every trainer was a Village Sprout once. Some still are.",
    "Your Pokemon believe in you. That has to count for something.",
    "Adventure is out there - and it brought snacks!"
  ];
  var el = document.getElementById('footer-tagline');
  if (el) el.textContent = taglines[Math.floor(Math.random() * taglines.length)];
})();

renderList();
</script>
</body>
</html>
